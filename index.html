    function wireTermArea(term) {
      termArea.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
          const targetId = tab.dataset.tab;

          termArea.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
          termArea.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));

          tab.classList.add("active");

          const targetPanel = termArea.querySelector(`#${targetId}`);
          if (targetPanel) {
            targetPanel.classList.add("active");
          }
        });
      });

      setupTermAutocomplete("addRelatedInput", "addRelatedSuggest", [
        term.id,
        ...(term.relacionados || [])
      ]);

      (term.relacionados || []).forEach(relatedId => {
        setupTermAutocomplete(
          `replaceInput-${relatedId}`,
          `replaceSuggest-${relatedId}`,
          [term.id, relatedId]
        );
      });

      (term.relacionadosNaoAutorizados || []).forEach(nome => {
        const slug = slugIcmg(nome);

        setupTermAutocomplete(
          `moveUpInput-${slug}`,
          `moveUpSuggest-${slug}`,
          [term.id]
        );
      });

      const saveBtn = document.getElementById("saveTermBtn");


    
      if (saveBtn) {
        saveBtn.onclick = async () => {
          const oldParentId = term.parentId;
          const before = snapshotTerm(term);

          const novoTermo = document.getElementById("editTermo").value.trim() || term.termo;
          const novaDefinicao = document.getElementById("editDefinicao").value.trim();
          const novaNotaEscopo = document.getElementById("editNotaEscopo").value.trim();
          const novaNotaUso = document.getElementById("editNotaUso").value.trim();
          const novoParentId = document.getElementById("editParent").value || null;

          const changed =
            novoTermo !== term.termo ||
            novaDefinicao !== term.definicao ||
            novaNotaEscopo !== term.notaEscopo ||
            novaNotaUso !== term.notaUso ||
            novoParentId !== term.parentId;

          if (changed && term.revisao !== REVIEW_NOVO && term.revisao !== REVIEW_EXCLUIR && !term.original) {
            term.original = before;
          }

          if (novoTermo !== term.termo) {
            registerPendingFieldChange(term, "termo", before.termo, novoTermo);

            if (!term.termoAnterior && term.revisao !== REVIEW_NOVO) {
              term.termoAnterior = term.termo;
            }

            term.termo = novoTermo;
          }

          if (novaDefinicao !== term.definicao) {
            registerPendingFieldChange(term, "definicao", before.definicao, novaDefinicao);
            term.definicao = novaDefinicao;
          }

          if (novaNotaEscopo !== term.notaEscopo) {
            registerPendingFieldChange(term, "notaEscopo", before.notaEscopo, novaNotaEscopo);
            term.notaEscopo = novaNotaEscopo;
          }

          if (novaNotaUso !== term.notaUso) {
            registerPendingFieldChange(term, "notaUso", before.notaUso, novaNotaUso);
            term.notaUso = novaNotaUso;
          }

          if (novoParentId !== term.parentId) {
            registerPendingFieldChange(term, "parentId", before.parentId, novoParentId);
            term.parentId = novoParentId;
          }

          if (changed) {
            markModified(term);
          }

          if (
            term.parentId &&
            term.parentId !== oldParentId &&
            !state.expanded.includes(term.parentId)
          ) {
            state.expanded.push(term.parentId);
          }

          await saveState();
          render();
        };
        }  

            termArea.querySelectorAll("[data-rel-action]").forEach(btn => {
              btn.onclick = async () => {
                const action = btn.dataset.relAction;
                const targetId = btn.dataset.targetId;

                if (action === "view") {
                  state.selectedId = targetId;
                  reviewMode = false;
                  render();
                  setActiveTab("cadastro");
                  return;
                }

                if (action === "remove") {
                  const related = getTerm(targetId);
                  const label = related ? displayTermName(related) : "este termo";

                  if (!confirm(`Remover a relação TR com "${label}"?`)) return;

                  removeAuthorizedRelation(term, targetId);

                  await saveState();
                  render();
                  setActiveTab("relacoes");
                  return;
                }

                if (action === "toggle-replace") {
                  const box = document.getElementById(`replaceBox-${targetId}`);
                  if (box) box.classList.toggle("hidden");
                  return;
                }

                if (action === "confirm-replace") {
                  const input = document.getElementById(`replaceInput-${targetId}`);
                  const newTargetId = getTermIdFromSearchInput(input);

                  if (!newTargetId) {
                    alert("Digite e selecione um termo válido para receber esta relação.");
                    return;
                  }

                  if (newTargetId === term.id || newTargetId === targetId) {
                    alert("Selecione um termo diferente.");
                    return;
                  }

                  removeAuthorizedRelation(term, targetId);
                  addAuthorizedRelation(term, newTargetId);

                  await saveState();
                  render();
                  setActiveTab("relacoes");
                }
              };
            });

            const addRelatedBtn = document.getElementById("addRelatedBtn");
            if (addRelatedBtn) {
              addRelatedBtn.onclick = async () => {
                const input = document.getElementById("addRelatedInput");
                const relatedId = getTermIdFromSearchInput(input);

                if (!relatedId) {
                  alert("Digite e selecione um termo válido para adicionar como TR.");
                  return;
                }

                if (relatedId === term.id) {
                  alert("O termo não pode ser relacionado a ele mesmo.");
                  return;
                }

                addAuthorizedRelation(term, relatedId);

                await saveState();
                render();
                setActiveTab("relacoes");
              };
            }


            const addUnauthorizedBtn = document.getElementById("addUnauthorizedBtn");
            if (addUnauthorizedBtn) {
              addUnauthorizedBtn.onclick = async () => {
                const value = prompt("Informe o novo sinônimo não autorizado / UP:");

                const upValue = String(value || "").trim();
                if (!upValue) return;

                const added = addUnauthorizedRelation(term, upValue);

                if (!added) return;

                await saveState();
                render();
                setActiveTab("relacoes");
              };
            }

            termArea.querySelectorAll("[data-up-action]").forEach(btn => {
              btn.onclick = async () => {
                const action = btn.dataset.upAction;
                const upValue = btn.dataset.upValue;

                if (!upValue) return;

                if (action === "toggle-move") {
                  const box = document.getElementById(`moveUpBox-${slugIcmg(upValue)}`);
                  if (box) box.classList.toggle("hidden");
                  return;
                }

                if (action === "confirm-move") {
                  const input = document.getElementById(`moveUpInput-${slugIcmg(upValue)}`);
                  const targetTermId = getTermIdFromSearchInput(input);

                  if (!targetTermId) {
                    alert("Digite e selecione um termo válido para receber este UP.");
                    return;
                  }

                  const index = (term.relacionadosNaoAutorizados || []).indexOf(upValue);

                  if (index < 0) {
                    alert("UP não encontrado neste termo.");
                    return;
                  }

                  const moved = moveUnauthorizedRelation(term, index, targetTermId);

                  if (!moved) return;

                await saveState();
                render();
                setActiveTab("relacoes");
                return;
                }

                if (action === "delete") {
                  if (!confirm(`Sugerir retirada do UP "${upValue}"?`)) return;

                  const index = (term.relacionadosNaoAutorizados || []).indexOf(upValue);

                  if (index < 0) {
                    alert("UP não encontrado neste termo.");
                    return;
                  }

                  removeUnauthorizedRelation(term, index);

                  await saveState();
                  render();
                  setActiveTab("relacoes");
                }
              };
            });

      const addCommentBtn = document.getElementById("addCommentBtn");
      if (addCommentBtn) {
        addCommentBtn.onclick = async () => {
          const text = document.getElementById("newCommentText").value.trim();
          if (!text) return;

          state.comments.push({
            id: uid("comment"),
            termId: term.id,
            author: currentUser.value.trim() || "Usuário",
            text,
            createdAt: nowLabel(),
            resolved: false,
            resolvedBy: null,
            resolvedAt: null,
            visto: false,
            vistoPor: "",
            vistoEm: "",
            replies: []
        });

          await saveState();
          render();
          setActiveTab("comentarios");
        };
      }

      document.querySelectorAll("[data-comment-action]").forEach(btn => {
        btn.onclick = async () => {
          const comment = state.comments.find(c => c.id === btn.dataset.commentId);
          if (!comment) return;

          if (btn.dataset.commentAction === "resolve") {
            comment.resolved = true;
            comment.resolvedBy = currentUser.value.trim() || "Usuário";
            comment.resolvedAt = nowLabel();

            comment.visto = true;
            comment.vistoPor = currentUser.value.trim() || "Usuário";
            comment.vistoEm = nowLabel();
          } else {
            comment.resolved = false;
            comment.resolvedBy = null;
            comment.resolvedAt = null;
          }

          await saveState();
          render();
          setActiveTab("comentarios");
        };
      });

      document.querySelectorAll("[data-pending-action]").forEach(btn => {
        btn.onclick = async () => {
          const termId = btn.dataset.termId;
          const action = btn.dataset.pendingAction;

         if (action === "view") {
          state.selectedId = termId;
          reviewMode = false;
          render();
          setActiveTab("cadastro");
          return;
          }

          if (action === "approve-change") {
            await approvePendingChange(btn.dataset.changeId);
            return;
          }

          if (action === "reject-change") {
            await rejectPendingChange(btn.dataset.changeId);
            return;
        }

        if (action === "approve") {
          await approvePending(termId);
          return;
        }

        if (action === "reject") {
          await rejectPending(termId);
          return;
        }
        };
      });
    }

    function removeTermCompletely(termId) {
      state.terms = state.terms.filter(t => t.id !== termId);
      state.comments = state.comments.filter(c => c.termId !== termId);
      state.terms.forEach(t => {
        t.relacionados = (t.relacionados || []).filter(id => id !== termId);
      });

      if (state.selectedId === termId) {
        state.selectedId = state.terms[0]?.id || null;
      }
    }

    function findPendingChangeById(changeId) {
  return pendingActionItems().find(change => change.id === changeId) || null;
}

function refreshReviewAfterSingleChange(term) {
  if (!term) return;

  if (term.revisao === REVIEW_NOVO || term.revisao === REVIEW_EXCLUIR) {
    return;
  }

  const remaining = pendingChangeItems(term);

  if (!remaining.length) {
    clearReview(term);
  }
}

function createActionHistoryItemFromChange(term, change, decisao, justificativa = "") {
  return {
    id: uid("action"),
    termId: term.id,
    termo: displayTermName(term),
    caminho: termPath(term),
    tipo: term.revisao,
    tipoLabel: reviewLabel(term.revisao),
    decisao,
    decididoPor: currentUser.value.trim() || "Usuário",
    decididoEm: nowLabel(),
    justificativa: justificativa || "",
    resumo: [changeTextForHistory(change)],
    original: term.original ? structuredClone(term.original) : null,
    final: snapshotTerm(term),
    sthStatus: decisao === "aprovada" ? "aguardando" : "nao_aplicavel",
    sthFeitoPor: "",
    sthFeitoEm: ""
  };
}

function registrarDecisaoMudanca(term, change, decisao, justificativa = "") {
  state.actionHistory = Array.isArray(state.actionHistory) ? state.actionHistory : [];
  state.actionHistory.push(createActionHistoryItemFromChange(term, change, decisao, justificativa));
}

async function approvePendingChange(changeId) {
  if (!userCanAccessManagement()) {
    alert("Você não tem permissão para aprovar ações.");
    return;
  }

  const change = findPendingChangeById(changeId);
  if (!change) return;

  const term = getTerm(change.termId);
  if (!term) return;

  if (change.kind === "whole-new" || change.kind === "whole-delete") {
    await approvePending(term.id);
    return;
  }

  if (!term.original) return;

  registrarDecisaoMudanca(term, change, "aprovada");

  if (change.kind === "field" || change.kind === "parent") {
    applyRawValueToTerm(term, change.field, change.suggestedRaw);

    term.original[change.field] = cloneRawValue(change.suggestedRaw);

    if (change.field === "termo") {
      term.termoAnterior = "";
    }

    // Sugestões concorrentes no mesmo campo são encerradas.
    removePendingChangesForField(term, change.field);
  }

  refreshReviewAfterSingleChange(term);

  await saveState();
  render();

  if (!reviewMode) {
    setActiveTab("pendencias");
  }
}

    async function rejectPendingChange(changeId) {
          if (!userCanAccessManagement()) {
            alert("Você não tem permissão para rejeitar ações.");
            return;
          }

          const change = findPendingChangeById(changeId);
          if (!change) return;

          const term = getTerm(change.termId);
          if (!term) return;

          if (change.kind === "whole-new" || change.kind === "whole-delete") {
            await rejectPending(term.id);
            return;
          }

          if (!term.original) return;

          const justificativa = pedirJustificativaRejeicao();

          if (justificativa === null) {
            return;
          }

          registrarDecisaoMudanca(term, change, "rejeitada", justificativa);

          if (change.kind === "field" || change.kind === "parent") {
            removePendingChangeById(term, change.id);

            const latestSameField = latestPendingChangeForField(term, change.field);

            if (latestSameField) {
              applyRawValueToTerm(term, change.field, latestSameField.suggestedRaw);
            } else {
              applyRawValueToTerm(term, change.field, term.original[change.field]);

              if (change.field === "termo") {
                term.termoAnterior = "";
              }
            }
          }

          refreshReviewAfterSingleChange(term);

          await saveState();
          render();

          if (!reviewMode) {
            setActiveTab("pendencias");
          }
        }

    async function approvePending(termId) {

      if (!userCanAccessManagement()) {
        alert("Você não tem permissão para aprovar ações.");
          return;
      }
      const term = getTerm(termId);
      if (!term) return;

      if (term.revisao === REVIEW_EXCLUIR) {
        if (childrenOf(term.id).length) {
          alert("Não é possível aprovar a exclusão de termo com termos específicos. Mova ou delibere os filhos primeiro.");
          return;
        }

        if (!confirm(`Aprovar a exclusão definitiva do termo "${displayTermName(term)}"?`)) return;

        registrarDecisao(term, "aprovada");
        removeTermCompletely(term.id);
      } else {
        registrarDecisao(term, "aprovada");
        clearReview(term);
        term.termoAnterior = "";
      }

      await saveState();
      render();

      if (!reviewMode) {
        setActiveTab("pendencias");
      }
    }

    async function rejectPending(termId, justificativaRecebida = null) {
      if (!userCanAccessManagement()) {
        alert("Você não tem permissão para rejeitar ações.");
        return;
      }
      const term = getTerm(termId);
      if (!term) return;

      if (term.revisao === REVIEW_NOVO) {
      if (childrenOf(term.id).length) {
        alert("Não é possível rejeitar termo novo com termos específicos. Delibere ou mova os filhos primeiro.");
        return;
      }

      if (!confirm(`Rejeitar e remover o termo novo "${displayTermName(term)}"?`)) return;

      const justificativa = justificativaRecebida || pedirJustificativaRejeicao();

    if (justificativa === null) {
      return;
    }

registrarDecisao(term, "rejeitada", justificativa);
removeTermCompletely(term.id);
    } else if (term.revisao === REVIEW_MODIFICADO) {
      const justificativa = justificativaRecebida || pedirJustificativaRejeicao();

    if (justificativa === null) {
      return;
    }

    registrarDecisao(term, "rejeitada", justificativa);

    if (term.original) {
      restoreTermFromOriginal(term);
    }

      clearReview(term);
    } else if (term.revisao === REVIEW_EXCLUIR) {
      const justificativa = justificativaRecebida || pedirJustificativaRejeicao();

    if (justificativa === null) {
      return;
    }

    registrarDecisao(term, "rejeitada", justificativa);
    clearReview(term);
    }

    await saveState();
    render();

    if (!reviewMode) {
      setActiveTab("pendencias");
    }
  }

    function normalizeIcmgKey(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim()
        .toUpperCase();
    }

    function normalizeIcmgName(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    const ICMG_CLASSES_SEM_RAIZ = new Set([
      "sem classe",
      "estrutura administrativa"
    ]);

    const ICMG_CLASSES_DESCARTADAS = new Set([
      "thesaurus"
    ]);

    const ICMG_TERMOS_DESCARTADOS = new Set([
      "thesaurus"
    ]);

    function isClasseIcmgSemRaiz(classe) {
      return ICMG_CLASSES_SEM_RAIZ.has(normalizeIcmgName(classe));
    }

    function isClasseIcmgDescartada(classe) {
      return ICMG_CLASSES_DESCARTADAS.has(normalizeIcmgName(classe));
    }

    function isTermoIcmgDescartado(termo) {
      return ICMG_TERMOS_DESCARTADOS.has(normalizeIcmgName(termo));
    }

    function normalizeSearchText(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9]+/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    function normalizeUpDuplicateKey(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9]+/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    function slugIcmg(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .toLowerCase();
    }

    function firstField(record, key) {
      const values = record.fields[key] || [];
      return String(values[0] || "").trim();
    }

    function allFields(record, key) {
      return (record.fields[key] || [])
        .map(v => String(v || "").trim())
        .filter(Boolean);
    }

    function parseIcmgTxt(text) {
      const lines = String(text || "")
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .split("\n");

      const records = [];
      let current = null;
      let currentKey = null;

      function startRecord(kind, value) {
        if (current) records.push(current);

        current = {
          kind,
          fields: {}
        };

        currentKey = kind;
        current.fields[currentKey] = [String(value || "").trim()];
      }

      function addField(key, value) {
        if (!current) return;

        currentKey = key;

        if (!current.fields[currentKey]) {
          current.fields[currentKey] = [];
        }

        current.fields[currentKey].push(String(value || "").trim());
      }

      function appendToCurrentField(value) {
        if (!current || !currentKey) return;

        const values = current.fields[currentKey];
        if (!values || !values.length) return;

        const lastIndex = values.length - 1;
        const line = String(value || "").trimEnd();

        if (!line.trim()) {
          values[lastIndex] += "\n";
        } else if (values[lastIndex]) {
          values[lastIndex] += "\n" + line;
        } else {
          values[lastIndex] = line;
        }
      }

      for (const rawLine of lines) {
        const line = rawLine.trimEnd();

        const match = line.match(/^\.\.([^:]+?)\.?:\s*(.*)$/);

        if (match) {
          const key = normalizeIcmgKey(match[1]);
          const value = match[2] || "";

          if (key === "TERMO" || key === "NAO AUTORIZADO") {
            startRecord(key, value);
          } else {
            addField(key, value);
          }
        } else {
          appendToCurrentField(line);
        }
      }

      if (current) records.push(current);

      return records;
    }

    function termoFromIcmgRecord(record) {
      const termo = firstField(record, "TERMO");
      const tq = firstField(record, "TQ");
      const controle = firstField(record, "CONTROLE");
      const classe = firstField(record, "CLASSE") || "Sem classe";
      const tg = firstField(record, "TG");

      const definicao = firstField(record, "DF");

      // NE = Nota Explicativa
      const notaExplicativa = allFields(record, "NE").join("\n\n");

      // NH = Nota Histórica
      const notaHistorica = allFields(record, "NH").join("\n\n");

      // UP = Usado por / sinônimos não autorizados
      const usadosPor = allFields(record, "UP");

      const id = controle ? `icmg-${controle}` : `icmg-${slugIcmg(termo)}`;

      return {
        id,
        parentId: null,
        termo,
        termoAnterior: "",
        conceito: tq || "",
        definicao,

        // Mantemos o nome interno notaEscopo para mexer menos no app,
        // mas o rótulo na tela será "Nota Explicativa".
        notaEscopo: notaExplicativa,

        // Mantemos o nome interno notaUso para mexer menos no app,
        // mas o rótulo na tela será "Nota Histórica".
        notaUso: notaHistorica,

        // TR será resolvido depois como relacionamento autorizado.
        relacionados: [],

        // UP fica aqui, separado dos TR.
        relacionadosNaoAutorizados: usadosPor,

        revisao: REVIEW_ORIGINAL,
        original: null,
        revisaoPor: "",
        revisaoEm: "",
        _classe: classe,
        _tg: tg,
        _tr: allFields(record, "TR")
      };
    }

    function montarTermosDaEstruturaIcmg(text) {
      const records = parseIcmgTxt(text);

      const authorizedRecords = records.filter(record => {
        if (record.kind !== "TERMO") return false;

        const termo = firstField(record, "TERMO");
        if (!termo) return false;

        const classe = firstField(record, "CLASSE") || "Sem classe";

        // Descarta termos estruturais que não devem aparecer na árvore.
        if (isTermoIcmgDescartado(termo)) return false;

        // Descarta classes que não devem aparecer nem como raiz nem como termo.
        if (isClasseIcmgDescartada(classe)) return false;

        // Evita importar o próprio nome da classe como termo filho/raiz.
        if (normalizeIcmgName(termo) === normalizeIcmgName(classe)) return false;

        return true;
      });

      const terms = authorizedRecords.map(termoFromIcmgRecord);

      const byName = new Map();
      const byTq = new Map();

      for (const term of terms) {
        byName.set(normalizeIcmgName(term.termo), term.id);

        if (term.conceito) {
          byTq.set(normalizeIcmgName(term.conceito), term.id);
        }
      }

      const classes = Array.from(new Set(
        terms
          .map(term => term._classe || "Sem classe")
          .filter(classe =>
            classe &&
            !isClasseIcmgSemRaiz(classe) &&
            !isClasseIcmgDescartada(classe)
          )
      )).sort((a, b) => a.localeCompare(b, "pt-BR"));

      const classTerms = classes.map(classe => ({
        id: `classe-${slugIcmg(classe)}`,
        parentId: null,
        termo: classe,
        termoAnterior: "",
        conceito: "",
        definicao: "Classe geral importada do documento ICMG.",
        notaEscopo: "",
        notaUso: "",
        relacionados: [],
        revisao: REVIEW_ORIGINAL,
        original: null,
        revisaoPor: "",
        revisaoEm: ""
      }));

      const classIdByName = new Map(
        classTerms.map(term => [normalizeIcmgName(term.termo), term.id])
      );

      for (const term of terms) {
        const tg = term._tg || "";
        const classe = term._classe || "Sem classe";

        const tgNorm = normalizeIcmgName(tg);
        const classeNorm = normalizeIcmgName(classe);

        const classId = classIdByName.get(classeNorm) || null;

        if (!tg) {
          term.parentId = classId;
        } else if (tgNorm === classeNorm) {
          term.parentId = classId;
        } else if (byName.has(tgNorm)) {
          term.parentId = byName.get(tgNorm);
        } else if (byTq.has(tgNorm)) {
          term.parentId = byTq.get(tgNorm);
        } else {
          term.parentId = classId;
        }

        const relatedIds = [];

        for (const relatedName of term._tr || []) {
          const relatedNorm = normalizeIcmgName(relatedName);
          const relatedId = byName.get(relatedNorm) || byTq.get(relatedNorm);

          if (relatedId && relatedId !== term.id && !relatedIds.includes(relatedId)) {
            relatedIds.push(relatedId);
          }
        }

        term.relacionados = relatedIds;

        delete term._classe;
        delete term._tg;
        delete term._tr;
      }

      return classTerms.concat(terms);
    }

    function importarIcmgTxt(file) {
      const reader = new FileReader();

      reader.onload = async () => {
        try {
          if (!confirm("Importar a estrutura do documento ICMG? Isso substituirá os dados atuais do protótipo.")) {
            return;
          }

          setStatus("Importando estrutura do documento ICMG...");

          const termos = montarTermosDaEstruturaIcmg(reader.result);

          if (!termos.length) {
            throw new Error("Nenhum termo autorizado ativo foi identificado no arquivo.");
          }

          const rootIds = termos
            .filter(term => term.parentId === null)
            .map(term => term.id);

          state = normalizeState({
            selectedId: termos[0]?.id || null,
            expanded: [],
            terms: termos,
            comments: [],
            actionHistory: [],
            icmgSourceVersion: "almg-api",
            icmgSourceImportedAt: nowLabel()
          });

          reviewMode = false;

          await saveState();
          render();

          setStatus(`Importação concluída. Termos carregados: ${termos.length}.`);
          alert(`Importação concluída. Termos carregados: ${termos.length}.`);
        } catch (error) {
          console.error(error);
          setStatus("Erro na importação do ICMG.");
          alert(`Erro ao importar o documento ICMG.\n\nDetalhe: ${error.message}`);
        }
      };

      reader.readAsText(file, "windows-1252");
    }

    function simpleHash(text) {
      let hash = 0;
      const value = String(text || "");

      for (let i = 0; i < value.length; i++) {
        hash = ((hash << 5) - hash) + value.charCodeAt(i);
        hash |= 0;
      }

      return `${value.length}-${hash}`;
    }

    async function obterVersaoIcmgGithub() {
      const response = await fetch(`${ICMG_TXT_URL}?check=${Date.now()}`, {
        method: "HEAD",
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(`Não foi possível verificar ${ICMG_TXT_URL}. HTTP ${response.status}`);
      }

      const etag = response.headers.get("etag") || "";
      const lastModified = response.headers.get("last-modified") || "";
      const contentLength = response.headers.get("content-length") || "";

      return [etag, lastModified, contentLength].filter(Boolean).join("|");
    }

    async function baixarIcmgTxtGithub() {
      const response = await fetch(`${ICMG_TXT_URL}?import=${Date.now()}`, {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(`Não foi possível baixar ${ICMG_TXT_URL}. HTTP ${response.status}`);
      }

      const buffer = await response.arrayBuffer();

      // O TXT do ICMG parece estar em Windows-1252, por isso não usamos UTF-8 aqui.
      return new TextDecoder("windows-1252").decode(buffer);
    }

    async function importarIcmgGithubSeNecessario({ forcar = false } = {}) {
      try {
        // REGRA DE SEGURANÇA:
        // Se já existe estrutura carregada do Supabase, nunca substitui automaticamente.
        // Importação automática só deve acontecer quando não houver nenhum termo salvo.
       if (!forcar && Array.isArray(state.terms) && state.terms.length > 0) {

            }

        setStatus("Importando ICMG.txt do GitHub...");

        const text = await baixarIcmgTxtGithub();

          throw new Error("Nenhum termo autorizado foi identificado no ICMG.txt.");

        return false;
      }
    }
    
    function safePdfText(value) {
      return String(value ?? "")
        .replaceAll("→", "->")
        .replaceAll("–", "-")
        .replaceAll("—", "-");
    }

    function pdfDateForFilename() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    function addPdfLine(doc, context, text, options = {}) {
      const marginLeft = context.marginLeft;
      const marginRight = context.marginRight;
      const pageHeight = context.pageHeight;
      const maxWidth = context.pageWidth - marginLeft - marginRight;
      const lineHeight = options.lineHeight || 6;

      if (options.fontSize) doc.setFontSize(options.fontSize);
      if (options.fontStyle) doc.setFont("helvetica", options.fontStyle);

      const lines = doc.splitTextToSize(safePdfText(text), maxWidth);

      for (const line of lines) {
        if (context.y > pageHeight - 18) {
          doc.addPage();
          context.y = 18;
        }

        doc.text(line, marginLeft, context.y);
        context.y += lineHeight;
      }

      if (options.after) {
        context.y += options.after;
      }

      doc.setFont("helvetica", "normal");
    }

    function addPdfSectionTitle(doc, context, title) {
      context.y += 4;

      if (context.y > context.pageHeight - 24) {
        doc.addPage();
        context.y = 18;
      }

      doc.setFontSize(14);
      doc.setFont("helvetica", "bold");
      doc.text(safePdfText(title), context.marginLeft, context.y);
      context.y += 8;

      doc.setFont("helvetica", "normal");
    }

    function actionTypeOrder(tipo) {
      const order = {
        [REVIEW_NOVO]: 1,
        [REVIEW_MODIFICADO]: 2,
        [REVIEW_EXCLUIR]: 3
      };

      return order[tipo] || 99;
    }

    function actionTypeTitle(tipo) {
      if (tipo === REVIEW_NOVO) return "Novos termos";
      if (tipo === REVIEW_MODIFICADO) return "Termos alterados";
      if (tipo === REVIEW_EXCLUIR) return "Exclusões sugeridas";
      return "Outras ações";
    }

    function sortedActionHistory() {
      return (state.actionHistory || [])
        .slice()
        .sort((a, b) => {
          const typeDiff = actionTypeOrder(a.tipo) - actionTypeOrder(b.tipo);
          if (typeDiff !== 0) return typeDiff;

          const decisionDiff = String(a.decisao || "").localeCompare(String(b.decisao || ""), "pt-BR");
          if (decisionDiff !== 0) return decisionDiff;

          return String(a.termo || "").localeCompare(String(b.termo || ""), "pt-BR");
        });
    }

    function downloadHistoryPdf() {
      if (!window.jspdf || !window.jspdf.jsPDF) {
        alert("Não foi possível carregar a biblioteca de PDF. Verifique a conexão e tente novamente.");
        return;
      }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: "mm", format: "a4" });

      const context = {
        marginLeft: 16,
        marginRight: 16,
        pageWidth: doc.internal.pageSize.getWidth(),
        pageHeight: doc.internal.pageSize.getHeight(),
        y: 18
      };

      doc.setFont("helvetica", "bold");
      doc.setFontSize(16);
      doc.text("Histórico da revisão - Thesaurus GCT-GDI", context.marginLeft, context.y);
      context.y += 8;

      doc.setFont("helvetica", "normal");
      doc.setFontSize(10);
      doc.text(`Gerado por ${safePdfText(currentUser.value.trim() || "Usuário")} em ${safePdfText(formatDateTimeBr(nowLabel()))}`, context.marginLeft, context.y);
      context.y += 10;

      const actions = sortedActionHistory();
      const comments = (state.comments || []).slice()
        .sort((a, b) => {
          const termA = getTerm(a.termId);
          const termB = getTerm(b.termId);
          const nameA = termA ? displayTermName(termA) : "";
          const nameB = termB ? displayTermName(termB) : "";
          const nameDiff = nameA.localeCompare(nameB, "pt-BR");
          if (nameDiff !== 0) return nameDiff;
          return String(a.createdAt || "").localeCompare(String(b.createdAt || ""));
        });

      addPdfSectionTitle(doc, context, "Decisões");

      if (!actions.length) {
        addPdfLine(doc, context, "Nenhuma decisão registrada.", { fontSize: 10, after: 2 });
      } else {
        let currentType = "";

        for (const action of actions) {
          if (action.tipo !== currentType) {
            currentType = action.tipo;
            addPdfSectionTitle(doc, context, actionTypeTitle(currentType));
          }

          addPdfLine(doc, context, `Termo: ${action.termo || "Termo não identificado"}`, { fontSize: 11, fontStyle: "bold" });
          addPdfLine(doc, context, `Caminho: ${action.caminho || "-"}`, { fontSize: 10 });
          addPdfLine(doc, context, `Tipo: ${action.tipoLabel || action.tipo || "-"}`, { fontSize: 10 });
          addPdfLine(doc, context, `Decisão: ${action.decisao === "aprovada" ? "aprovada" : "rejeitada"}`, { fontSize: 10 });
          addPdfLine(doc, context, `Decidido por: ${action.decididoPor || "-"}`, { fontSize: 10 });
          addPdfLine(doc, context, `Decidido em: ${formatDateTimeBr(action.decididoEm) || "-"}`, { fontSize: 10 });

          if (action.decisao === "rejeitada" && action.justificativa) {
            addPdfLine(doc, context, `Justificativa: ${action.justificativa}`, { fontSize: 10 });
          }

          if (action.decisao === "aprovada") {
            addPdfLine(doc, context, `STH: ${action.sthStatus === "feito" ? "feito" : "aguardando execução"}`, { fontSize: 10 });

            if (action.sthStatus === "feito") {
              addPdfLine(doc, context, `Feito no STH por: ${action.sthFeitoPor || "-"}`, { fontSize: 10 });
              addPdfLine(doc, context, `Feito no STH em: ${formatDateTimeBr(action.sthFeitoEm) || "-"}`, { fontSize: 10 });
            }
          }

          if (Array.isArray(action.resumo) && action.resumo.length) {
            addPdfLine(doc, context, "Resumo:", { fontSize: 10, fontStyle: "bold" });
            action.resumo.forEach(item => {
              addPdfLine(doc, context, `- ${item}`, { fontSize: 10 });
            });
          }

          context.y += 4;
        }
      }

      addPdfSectionTitle(doc, context, "Comentários e respostas");

      if (!comments.length) {
        addPdfLine(doc, context, "Nenhum comentário registrado.", { fontSize: 10 });
      } else {
        for (const comment of comments) {
          const term = getTerm(comment.termId);

          addPdfLine(doc, context, `Termo: ${term ? displayTermName(term) : "Termo não encontrado"}`, { fontSize: 11, fontStyle: "bold" });
          addPdfLine(doc, context, `Caminho: ${term ? termPath(term) : "-"}`, { fontSize: 10 });
          addPdfLine(doc, context, `Comentário de: ${comment.author || "Usuário"}`, { fontSize: 10 });
          addPdfLine(doc, context, `Data: ${formatDateTimeBr(comment.createdAt) || "-"}`, { fontSize: 10 });
          addPdfLine(doc, context, `Situação: ${comment.visto ? "visto" : "não visto"}${comment.resolved ? " / resolvido" : ""}`, { fontSize: 10 });
          addPdfLine(doc, context, `Comentário: ${comment.text || "-"}`, { fontSize: 10 });

          const replies = Array.isArray(comment.replies) ? comment.replies : [];

          if (replies.length) {
            addPdfLine(doc, context, "Respostas:", { fontSize: 10, fontStyle: "bold" });

            replies.forEach(reply => {
              addPdfLine(doc, context, `- ${reply.author || "Usuário"} em ${formatDateTimeBr(reply.createdAt) || "-"}: ${reply.text || ""}`, { fontSize: 10 });
            });
          }

          context.y += 4;
        }
      }

      doc.save(`historico-tesauro-${pdfDateForFilename()}.pdf`);
    }

    // ============================================================
    // Importação do Thesaurus ALMG
    // Busca as páginas e filtra apenas <autorizado>true</autorizado>.
    // ============================================================
    function sameName(localName, names) {
      const normalized = String(localName || "").toLowerCase();
      return names.some(name => String(name || "").toLowerCase() === normalized);
    }

    function getDirectChildElement(element, possibleNames) {
      for (const child of Array.from(element.children || [])) {
        if (sameName(child.localName, possibleNames)) return child;
      }
      return null;
    }

    function getDirectChildText(element, possibleNames) {
      const child = getDirectChildElement(element, possibleNames);
      return child ? String(child.textContent || "").trim() : "";
    }

    function getDescendantText(element, possibleNames) {
      const descendants = Array.from(element.getElementsByTagName("*"));
      for (const child of descendants) {
        if (sameName(child.localName, possibleNames)) {
          return String(child.textContent || "").trim();
        }
      }
      return "";
    }

    function getBestText(element, possibleNames) {
      return getDirectChildText(element, possibleNames) || getDescendantText(element, possibleNames);
    }

    function parseBool(value) {
      return ["true", "1", "sim", "s"].includes(String(value || "").trim().toLowerCase());
    }

    function makeSafeId(value) {
      const raw = String(value || "").trim();
      if (!raw) return uid("almg");

      let safe = "";
      for (const char of raw) {
        const code = char.charCodeAt(0);
        const isNumber = code >= 48 && code <= 57;
        const isUpper = code >= 65 && code <= 90;
        const isLower = code >= 97 && code <= 122;
        const isAllowed = isNumber || isUpper || isLower || char === "_" || char === "-";
        safe += isAllowed ? char : "-";
      }
      return "almg-" + safe;
    }

    function getTermParentIdFromXml(element) {
      const directParentId = getBestText(element, [
        "termoPaiId",
        "idTermoPai",
        "termoGeralId",
        "idTermoGeral",
        "idPai",
        "paiId",
        "idAscendente",
        "ascendenteId"
      ]);

      if (directParentId) return makeSafeId(directParentId);

      const parentElement = getDirectChildElement(element, [
        "termoPai",
        "termoGeral",
        "pai",
        "ascendente",
        "termoAscendente"
      ]);

      if (parentElement) {
        const nestedParentId = getBestText(parentElement, ["id", "codigo", "cod", "controle", "idTermo"]);
        if (nestedParentId) return makeSafeId(nestedParentId);
      }

      return null;
    }

    function getHierarchyPathsFromXml(element) {
      const paths = [];
      const candidates = Array.from(element.getElementsByTagName("*"));

      for (const node of candidates) {
        if (sameName(node.localName, ["hierarquia", "caminho", "path", "ocorrenciaHierarquia", "ocorrenciasHierarquias"])) {
          const text = String(node.textContent || "").trim();
          if (text.includes("/") && text.length < 1000) paths.push(text);
        }
      }

      return Array.from(new Set(paths));
    }

    function xmlToTerms(xmlText) {
      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, "application/xml");
      const parserError = xml.querySelector("parsererror");

      if (parserError) {
        throw new Error("Erro ao interpretar XML retornado pela API.");
      }

      const termElements = Array.from(xml.getElementsByTagName("*")).filter(el => {
        return getDirectChildText(el, ["autorizado"]) !== "";
      });

      const authorized = [];
      const pathDerivedTerms = new Map();

      for (const element of termElements) {
        const autorizado = parseBool(getDirectChildText(element, ["autorizado"]));
        if (!autorizado) continue;

        const rawId = getBestText(element, ["id", "codigo", "cod", "controle", "idTermo", "identificador"]);
        const termo = getBestText(element, ["termo", "descricao", "descritor", "nome", "nomeTermo"]);
        if (!termo) continue;

        const id = makeSafeId(rawId || termo);
        const parentId = getTermParentIdFromXml(element);
        const definicao = getBestText(element, ["definicao", "definição", "notaExplicativa", "nota", "conceito"]);
        const notaEscopo = getBestText(element, ["notaEscopo", "notaDeEscopo", "escopo"]);
        const notaUso = getBestText(element, ["notaUso", "notaDeUso", "uso"]);

        authorized.push({
          id,
          parentId,
          termo,
          termoAnterior: "",
          conceito: "",
          definicao,
          notaEscopo,
          notaUso,
          relacionados: [],
          revisao: REVIEW_ORIGINAL,
          original: null,
          revisaoPor: "",
          revisaoEm: ""
        });

        const paths = getHierarchyPathsFromXml(element);
        for (const path of paths) {
          const parts = path
            .split("/")
            .map(p => p.trim())
            .filter(Boolean)
            .filter(p => !["thesaurus", "tesauro"].includes(p.toLowerCase()));

          if (parts.length > 1) {
            let previousId = null;
            for (const part of parts) {
              const pathId = makeSafeId(`path-${part}`);
              if (!pathDerivedTerms.has(pathId)) {
                pathDerivedTerms.set(pathId, {
                  id: pathId,
                  parentId: previousId,
                  termo: part,
                  termoAnterior: "",
                  conceito: "",
                  definicao: "",
                  notaEscopo: "",
                  notaUso: "",
                  relacionados: [],
                  revisao: REVIEW_ORIGINAL,
                  original: null,
                  revisaoPor: "",
                  revisaoEm: ""
                });
              }
              previousId = pathId;
            }
          }
        }
      }

      return {
        totalTermElements: termElements.length,
        authorizedTerms: authorized,
        pathDerivedTerms: Array.from(pathDerivedTerms.values())
      };
    }

    function mergeTermsById(terms) {
      const map = new Map();

      for (const term of terms) {
        if (!map.has(term.id)) {
          map.set(term.id, term);
          continue;
        }

        const current = map.get(term.id);
        map.set(term.id, {
          ...current,
          ...term,
          conceito: term.conceito || current.conceito || "",
          definicao: term.definicao || current.definicao || "",
          notaEscopo: term.notaEscopo || current.notaEscopo || "",
          notaUso: term.notaUso || current.notaUso || "",
          parentId: term.parentId || current.parentId || null,
          relacionados: Array.from(new Set([...(current.relacionados || []), ...(term.relacionados || [])])),
          revisao: current.revisao || term.revisao || REVIEW_ORIGINAL
        });
      }

      return Array.from(map.values());
    }

    function corrigirPaisInexistentes(terms) {
      const ids = new Set(terms.map(t => t.id));
      return terms.map(t => {
        if (!t.parentId || ids.has(t.parentId)) return t;
        return { ...t, parentId: null };
      });
    }

    async function baixarTodosTermosAlmg() {
      let pagina = 1;
      let allAuthorized = [];
      let allPathTerms = [];

      while (true) {
        const url = `${ALMG_THESAURUS_URL}?p=${pagina}&tp=${ALMG_PAGE_SIZE}`;
        setStatus(`Importando página ${pagina} com ${ALMG_PAGE_SIZE} registros por página...`);

        const response = await fetch(url, {
          headers: { "Accept": "application/xml,text/xml,*/*" }
        });

        if (response.status === 400 || response.status === 404) {
          if (allAuthorized.length > 0 || allPathTerms.length > 0) {
            setStatus(`Fim da importação. Última página válida: ${pagina - 1}.`);
            break;
          }
          throw new Error(`Erro na primeira página: HTTP ${response.status}`);
        }

        if (!response.ok) {
          throw new Error(`Erro na página ${pagina}: HTTP ${response.status}`);
        }

        const xmlText = await response.text();
        const parsed = xmlToTerms(xmlText);

        allAuthorized = allAuthorized.concat(parsed.authorizedTerms);
        allPathTerms = allPathTerms.concat(parsed.pathDerivedTerms);

        setStatus(`Página ${pagina} importada. Termos autorizados até agora: ${allAuthorized.length}.`);

        if (parsed.totalTermElements === 0) break;
        if (parsed.totalTermElements < ALMG_PAGE_SIZE) break;

        pagina += 1;
        await sleep(ALMG_DELAY_MS);
      }

      const merged = mergeTermsById(allPathTerms.concat(allAuthorized));
      const corrigidos = corrigirPaisInexistentes(merged);

      setStatus(`Importação finalizada. Autorizados encontrados: ${allAuthorized.length}. Termos na árvore: ${corrigidos.length}.`);
      return corrigidos;
    }

    async function importarThesaurusAlmg() {
      if (!confirm("Importar termos autorizados do Thesaurus da ALMG? Isso substituirá os dados atuais do protótipo.")) return;

      try {
        importAlmgBtn.disabled = true;
        setStatus("Iniciando importação do Thesaurus ALMG...");

        const termos = await baixarTodosTermosAlmg();

        if (!termos.length) {
          throw new Error("Nenhum termo autorizado foi identificado no XML retornado pela API.");
        }

        state = normalizeState({
          selectedId: termos[0]?.id || null,
          expanded: [],
          terms: termos,
          comments: []
        });

        await saveState();
        render();
        setStatus(`Importação concluída. Termos carregados: ${termos.length}.`);
        alert(`Importação concluída. Termos carregados: ${termos.length}.`);
      } catch (error) {
        console.error(error);
        setStatus("Erro na importação.");
        alert(`Erro ao importar Thesaurus da ALMG.

Detalhe: ${error.message}

Se aparecer erro de CORS no console do navegador, a importação direta pelo GitHub Pages está bloqueada e será necessário usar um script Python ou uma função intermediária.`);
      } finally {
        importAlmgBtn.disabled = false;
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

   function render() {
      state = normalizeState(state);
      buildIndexes();

      renderTree();
      renderParentOptions();
      updateReviewTopButton();

      if (reviewMode) {
        renderPendingArea();
      } else {
        renderTermArea();
      }
    }

    reviewTopBtn.addEventListener("click", () => {
      if (!userCanAccessManagement()) return;

      reviewMode = true;
      managementTab = "acoes";
      render();
    });

    collapseToClassesBtn.addEventListener("click", collapseTreeToClasses);
    downloadTreeTxtBtn.addEventListener("click", downloadCompleteTreeTxt);
    silegisSearchBtn.addEventListener("click", renderSilegisSearchArea);
    searchInput.addEventListener("input", renderTree);
    clearSearchBtn.addEventListener("click", () => {
      searchInput.value = "";
      renderTree();
    });

    addTermBtn.addEventListener("click", addTerm);
    newTerm.addEventListener("keydown", e => {
      if (e.key === "Enter") addTerm();
    });

    exportBtn.addEventListener("click", exportJson);
    importBtn.addEventListener("click", () => importFile.click());
    importIcmgBtn.addEventListener("click", () => importIcmgFile.click());
    importAlmgBtn.addEventListener("click", importarThesaurusAlmg);

    importIcmgFile.addEventListener("change", e => {
      const file = e.target.files[0];
      if (file) importarIcmgTxt(file);
      importIcmgFile.value = "";
    });

    resetBtn.addEventListener("click", async () => {
      if (!confirm("Restaurar os dados de exemplo? Isso substituirá os dados salvos no Supabase.")) return;
      state = structuredClone(exemplo);
      await saveState();
      render();
    });

    async function iniciarApp() {
      setStatus("Carregando tesauro...");

      state = await loadState();
      state = normalizeState(state);

      const atualizadoPeloTxt = FORCE_REIMPORT_ICMG_ON_START
          ? await importarIcmgGithubSeNecessario({ forcar: true })
          : await importarIcmgGithubSeNecessario();

      // Ao abrir o app, não mostra automaticamente o último termo salvo.
      state.selectedId = null;
      reviewMode = false;

      collapseOnlyClasses();
      render();

      if (!atualizadoPeloTxt) {
        setStatus("");
      }
    }

    initAuth();
  </script>
