    <!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thesaurus GCT-GDI</title>
  <link rel="icon" type="image/png" href="assets/favicom-almg.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    :root {
      --border: #d8d8d8;
      --muted: #666;
      --soft: #f7f7f7;
      --selected: #e8f0fe;
      --blue: #1f5fbf;
      --green: #1f7a3a;
      --red: #a83232;
      --blue-bg: #edf4ff;
      --green-bg: #edf8f0;
      --red-bg: #fff0f0;
      --left-width: 540px;
    }


    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      color: #111;
      background: white;
    }

    header {
      height: 42px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: #fff;
    }

    header strong { font-size: 15px; }

    header .user-area {
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .top-actions {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .review-top-btn {
      font-weight: bold;
      border-color: var(--border);
    }

    .review-top-btn.has-pending {
      border-color: var(--red);
      color: var(--red);
      background: var(--red-bg);
    }

    body.logged-out header,
    body.logged-out .app {
      display: none;
    }

    body.logged-in #loginScreen {
      display: none;
    }

    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f3f3f3;
      padding: 24px;
    }

    .login-card {
      width: 380px;
      max-width: calc(100vw - 40px);
      border: 0;
      border-radius: 0;
      padding: 0;
      background: transparent;
      box-shadow: none;
    }

    .relation-list-compact {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .relation-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
    }

    .relation-name {
      flex: 1;
      min-width: 0;
      line-height: 1.35;
      font-weight: bold;
    }

    .relation-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 30px;
      height: 30px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
    }

    .icon-btn:hover {
      background: #f3f3f3;
    }

    .icon-btn.danger {
      color: var(--red);
      border-color: #d9b0b0;
    }

    .icon-btn.success {
      color: var(--green);
      border-color: #9ac9a5;
    }

    .inline-action-box {
      margin-top: 6px;
      padding: 8px;
      border: 1px dashed var(--border);
      border-radius: 6px;
      background: #fafafa;
    }

    .inline-action-box.hidden {
      display: none;
    }

    .term-search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      margin-top: 8px;
    }

    .term-search-row input {
      width: 100%;
    }

    .term-suggest-wrap {
      position: relative;
      width: 100%;
    }

    .term-suggest-box {
      position: absolute;
      z-index: 50;
      left: 0;
      right: 0;
      top: calc(100% + 2px);
      max-height: 260px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
    }

    .term-suggest-box.hidden {
      display: none;
    }

    .term-suggest-option {
      width: 100%;
      display: block;
      text-align: left;
      border: 0;
      border-bottom: 1px solid #eee;
      border-radius: 0;
      padding: 8px 10px;
      background: #fff;
      cursor: pointer;
    }

    .term-suggest-option:hover {
      background: var(--selected);
    }

    .term-suggest-empty {
      padding: 8px 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .login-logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 22px;
    }

    .login-logo {
      width: 340px;
      max-width: 100%;
      height: auto;
      display: block;
    }

    .login-project-title {
      margin: 0 0 4px;
      color: #0b2a57;
      font-size: 16px;
      font-weight: 700;
      text-align: left;
    }

    .login-project-subtitle {
      margin: 0 0 14px;
      color: #333;
      font-size: 11px;
      text-align: left;
    }

    .login-card .field {
      margin-bottom: 16px;
    }

    .login-card .field label {
      display: block;
      color: #0b2a57;
      font-size: 16px;
      margin-bottom: 8px;
    }

    .login-card .field input {
      width: 100%;
      height: 42px;
      border: 1px solid #c9c9c9;
      border-radius: 4px;
      padding: 0 10px;
      background: #fff;
      outline: none;
    }

    .login-card .field input:focus {
      border-color: #d00000;
      box-shadow: 0 0 0 4px rgba(208, 0, 0, 0.18);
    }

    .login-card .login-submit.primary {
      width: 100%;
      height: 42px;
      margin-top: 16px;
      border: 0;
      border-radius: 4px;
      background: #c40000;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
    }

    .login-card .login-submit.primary:hover {
      background: #a80000;
    }

    .login-error {
      color: #a83232;
      min-height: 18px;
      margin: 12px 0 0;
      font-size: 13px;
      text-align: center;
    }

    .user-name-display {
      color: #111;
      font-weight: bold;
    }

    .logout-btn {
      margin-left: 6px;
    }
    
    input, textarea, select, button { font: inherit; }

    button {
      cursor: pointer;
      border: 1px solid var(--border);
      background: #fff;
      padding: 5px 8px;
      border-radius: 4px;
    }

    button:hover { background: #f3f3f3; }

    button.primary {
      border-color: var(--blue);
      color: white;
      background: var(--blue);
    }

    button.danger {
      border-color: #c9a0a0;
      color: var(--red);
    }

    button.success {
      border-color: #9ac9a5;
      color: var(--green);
    }

    .app {
      height: calc(100vh - 42px);
      display: grid;
      grid-template-columns: var(--left-width) 7px 1fr;
    }

    .left {
      border-right: 1px solid var(--border);
      padding: 10px;
      overflow: auto;
      background: #fff;
    }

    .splitter {
      cursor: col-resize;
      background: #f4f4f4;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .splitter:hover,
    .splitter.resizing {
      background: var(--selected);
    }

    body.resizing {
      cursor: col-resize;
      user-select: none;
    }

    .tree-box {
      overflow: auto;
    }

    .right {
      padding: 10px 14px;
      overflow: auto;
      background: #fff;
    }

    .section-title {
      font-weight: bold;
      margin: 6px 0 8px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      margin-bottom: 10px;
    }

    .search-row input,
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px;
      background: #fff;
    }

    .tree-box {
      border: 1px solid var(--border);
      min-height: 360px;
      padding: 6px;
      background: #fff;
    }

    .root-drop {
      border: 1px dashed #bbb;
      border-radius: 4px;
      padding: 5px 7px;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      background: #fafafa;
    }

    .root-drop.drag-over {
      border-color: var(--blue);
      background: var(--selected);
      color: var(--blue);
    }

    .tree-item {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 32px;
      padding: 3px 6px;
      border-radius: 4px;
      white-space: nowrap;
      border-left: 4px solid transparent;
    }

    .tree-item:hover { background: #f5f5f5; }

    .tree-item.selected {
      background: var(--selected);
      color: #0b3d91;
      font-weight: bold;
    }

    .tree-item.drag-over {
      outline: 1px dashed var(--blue);
      background: var(--selected);
    }

    .tree-item.review-modificado {
      border-left-color: var(--blue);
      background: var(--blue-bg);
    }

    .tree-item.review-novo {
      border-left-color: var(--green);
      background: var(--green-bg);
    }

    .tree-item.review-excluir {
      border-left-color: var(--red);
      background: var(--red-bg);
      color: var(--red);
    }

    .tree-item.review-excluir .term-label,
    .tree-item.review-excluir .toggle {
      color: var(--red);
      font-weight: bold;
    }

    .tree-item.review-modificado .term-label,
    .tree-item.review-modificado .toggle {
      color: var(--blue);
      font-weight: bold;
    }  

    .tree-item.review-novo .term-label,
    .tree-item.review-novo .toggle {
      color: var(--green);
      font-weight: bold;
    }

    .tree-item.review-excluir .term-label,
    .tree-item.review-excluir .toggle {
      color: var(--red);
      font-weight: bold;
    }

    .toggle {
      width: 28px;
      border: 0;
      background: transparent;
      padding: 0;
      color: #333;
      font-size: 17px;
      font-weight: bold;
      line-height: 1;
    }

    .term-label {
      flex: 1;
      text-align: left;
      border: 0;
      background: transparent;
      padding: 5px 4px;
      font-size: 16px;
    }

    .review-badge {
      font-size: 12px;
      padding: 1px 5px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: #fff;
    }

    .review-badge.modificado { color: var(--blue); border-color: var(--blue); }
    .review-badge.novo { color: var(--green); border-color: var(--green); }
    .review-badge.excluir { color: var(--red); border-color: var(--red); }

    .search-match-badge {
      font-size: 12px;
      padding: 1px 5px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: #fff;
      font-weight: normal;
    }

    .add-box {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 980px;
    }

    .field { margin-bottom: 9px; }
    .field.full { grid-column: 1 / -1; }

    .field label {
      display: block;
      color: #333;
      font-size: 12px;
      margin-bottom: 3px;
    }

    textarea {
      resize: vertical;
      min-height: 72px;
    }

    #editDefinicao {
      min-height: 150px;
    }

    .term-header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 10px;
    }

    .term-header h1 {
      font-size: 20px;
      margin: 0 0 3px;
      font-weight: normal;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .legend-mark {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .legend-mark.blue { background: var(--blue); }
    .legend-mark.green { background: var(--green); }
    .legend-mark.red { background: var(--red); }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin: 8px 0 12px;
    }

    .tab {
      padding: 8px 12px;
      border: 1px solid transparent;
      border-bottom: 0;
      background: transparent;
      border-radius: 4px 4px 0 0;
    }

    .tab.active {
      border-color: var(--border);
      background: white;
      font-weight: bold;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .toolbar {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .relation-box,
    .comment-box {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      background: #fff;
    }

    .relation-box-up {
      border-left: 5px solid var(--red);
    }

    .relation-box-tr {
      border-left: 5px solid var(--green);
    }

    .relation-box-up > strong {
      color: var(--red);
    }

    .relation-box-tr > strong {
      color: var(--green);
    }

    .relation-box-up .relation-row {
      border-left: 4px solid rgba(168, 50, 50, 0.45);
    }

    .relation-box-tr .relation-row {
      border-left: 4px solid rgba(31, 122, 58, 0.45);
    }

    .comment-box.resolved {
      background: var(--soft);
      color: #555;
    }

    .reply-list {
      margin-top: 10px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    .reply-item {
      margin-top: 6px;
      padding: 7px;
      border-left: 3px solid var(--blue);
      background: #fafafa;
    }

    .reply-box {
      margin-top: 10px;
    }

    .reply-box textarea {
      width: 100%;
      min-height: 60px;
      resize: vertical;
    }

    .management-header-actions {
      margin-top: 10px;
    }

    .comment-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 5px;
    }

    .status-pill {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      background: #eee;
      font-size: 12px;
    }

    .status-pill.open { background: #fff3cd; }
    .status-pill.resolved { background: #e2f4e8; }

    .empty {
      color: var(--muted);
      padding: 10px;
    }

    .small-list {
      line-height: 1.7;
      margin: 0;
      padding-left: 18px;
    }

    .pending-list {
      display: grid;
      gap: 8px;
    }

    .pending-card {
      border: 1px solid var(--border);
      border-left: 5px solid transparent;
      border-radius: 6px;
      padding: 10px;
      background: #fff;
    }

    .pending-card.review-modificado {
      border-left-color: var(--blue);
      background: var(--blue-bg);
    }

    .pending-card.review-novo {
      border-left-color: var(--green);
      background: var(--green-bg);
    }

    .pending-card.review-excluir {
      border-left-color: var(--red);
      background: var(--red-bg);
    }

    .pending-title {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 5px;
    }

    .pending-summary {
      margin: 6px 0;
      padding-left: 18px;
      line-height: 1.5;
    }

    .change-summary {
      margin: 10px 0 14px 0;
      padding: 10px 12px;
      border-left: 3px solid var(--blue);
      background: rgba(255, 255, 255, 0.55);
    }

    .change-summary-title {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .change-summary-block {
      margin-top: 10px;
    }

    .change-summary-label {
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
    }

    .change-summary-text {
      white-space: pre-wrap;
      line-height: 1.45;
    }

    .review-summary li,
      .pending-summary li {
         margin-bottom: 12px;
      }

      .review-summary li:last-child,
      .pending-summary li:last-child {
        margin-bottom: 0;
       }

        .export-box {
          margin-top: 16px;
          border-top: 1px solid var(--border);
          padding-top: 10px;
        }

        .export-box {
          display: none;
          margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    #statusMessage {
      margin-top: 8px;
      line-height: 1.35;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        height: auto;
      }

      .splitter {
        display: none;
      }
      .left {
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="logged-out">
  <div id="loginScreen" class="login-screen">
    <form id="loginForm" class="login-card">
      <div class="login-logo-wrap">
        <img
          src="assets/logo-almg.png"
          alt="Assembleia Legislativa de Minas Gerais"
          class="login-logo"
        />
      </div>

      <div class="login-project-title">Thesaurus GCT–GDI</div>

      <div class="field">
        <label for="loginUsuario">Matrícula</label>
        <input
          id="loginUsuario"
          type="text"
          autocomplete="username"
          autofocus
        />
      </div>

      <div class="field">
        <label for="loginSenha">Senha</label>
        <input
          id="loginSenha"
          type="password"
          autocomplete="current-password"
        />
      </div>

      <button id="loginBtn" type="submit" class="primary login-submit">Entrar</button>

      <p id="loginError" class="login-error"></p>
    </form>
</div>
 <header>
  <strong>Thesaurus GCT-GDI</strong>

  <div class="top-actions">
    <button id="reviewTopBtn" class="review-top-btn">Gestão (0)</button>
  </div>

  <div class="user-area">
      <span>Usuário:</span>
      <span id="currentUserDisplay" class="user-name-display"></span>

      <input id="currentUser" type="hidden" value="" />
      <input id="currentProfile" type="hidden" value="" />

      <button id="logoutBtn" class="logout-btn">Sair</button>
</div>
</header>

  <main class="app">
    <aside class="left">
      <div class="section-title">Hierarquia</div>
      <div class="search-row">
        <input id="searchInput" type="search" placeholder="Pesquisar termo" />
        <button id="clearSearchBtn">limpar</button>
      </div>

      <div class="legend">
        <span><i class="legend-mark blue"></i> alterado</span>
        <span><i class="legend-mark green"></i> novo</span>
        <span><i class="legend-mark red"></i> exclusão sugerida</span>
      </div>

      <div class="toolbar" style="margin-bottom: 8px;">
        <button id="collapseToClassesBtn">Recolher para classes</button>
        <button id="downloadTreeTxtBtn">Baixar estrutura completa</button>
        <button id="silegisSearchBtn">Pesquisa no Silegis</button>
      </div>

      

      <div id="tree" class="tree-box"></div>

      <div class="add-box">
        <div class="section-title">Novo termo</div>
        <div class="field">
          <label for="newTerm">Termo</label>
          <input id="newTerm" type="text" placeholder="Ex.: Audiência pública" />
        </div>
        <div class="field">
          <label for="newParent">Termo geral</label>
          <select id="newParent"></select>
        </div>
        <button id="addTermBtn" class="primary">Criar termo</button>
      </div>

      <div class="export-box">
        <div class="section-title">Dados</div>
        <div class="toolbar">
          <button id="exportBtn">Exportar JSON</button>
          <button id="importBtn">Importar JSON</button>
          <button id="importIcmgBtn">Importar ICMG TXT</button>
          <button id="importAlmgBtn">Importar Thesaurus ALMG</button>
          <button id="resetBtn" class="danger">Restaurar exemplo</button>
        </div>
        <input id="importFile" type="file" accept="application/json" hidden />
        <input id="importIcmgFile" type="file" accept=".txt,text/plain" hidden />
        <p class="muted">Nesta versão, os dados são salvos no Supabase, na tabela app_state.</p>
        <p id="statusMessage" class="muted"></p>
      </div>
    </aside>

    <div id="splitter" class="splitter" title="Arraste para redimensionar"></div>

    <section class="right">
      <div id="termArea"></div>
    </section>
  </main>

  <script>
    // ============================================================
    // CONFIGURAÇÃO DO SUPABASE
    // Use a Project URL sem /rest/v1 no final.
    // Use a anon public key.
    // Não use a chave service_role no HTML.
    // ============================================================
    const SUPABASE_URL = "https://hyimodkpyzunfrodnola.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5aW1vZGtweXp1bmZyb2Rub2xhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzkyMzcsImV4cCI6MjA5NDI1NTIzN30.DmBvcx9_KQM3-ce9-99O5jrfSeAHBo-cMpPGSGcFz3s";
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function setLeftWidth(px) {
      const min = 280;
      const max = Math.max(360, window.innerWidth - 360);
      const width = Math.min(Math.max(px, min), max);

      document.documentElement.style.setProperty("--left-width", `${width}px`);
      localStorage.setItem(LAYOUT_KEY, String(width));
    }

    function initResizableLayout() {
      const savedWidth = Number(localStorage.getItem(LAYOUT_KEY));

      if (savedWidth) {
        setLeftWidth(savedWidth);
      }

      let resizing = false;

      splitter.addEventListener("pointerdown", event => {
        resizing = true;
        splitter.classList.add("resizing");
        document.body.classList.add("resizing");
        splitter.setPointerCapture(event.pointerId);
      });

      splitter.addEventListener("pointermove", event => {
        if (!resizing) return;
        setLeftWidth(event.clientX);
      });

      function stopResize() {
        resizing = false;
        splitter.classList.remove("resizing");
        document.body.classList.remove("resizing");
      }

      splitter.addEventListener("pointerup", stopResize);
      splitter.addEventListener("pointercancel", stopResize);
    }

    async function carregarPerfilUsuario(authUser) {
      const { data, error } = await db
        .from("app_profiles")
        .select("matricula, nome, perfil, ativo")
        .eq("id", authUser.id)
        .single();

      if (error) {
        console.error(error);
        throw new Error("Não foi possível carregar o perfil do usuário.");
      }

      if (!data || data.ativo !== true) {
        throw new Error("Usuário sem perfil ativo.");
      }

      return data;
    }

    async function iniciarComUsuarioAutenticado(authUser) {
      const profile = await carregarPerfilUsuario(authUser);

      setLoggedInProfile(profile);
      mostrarApp();

      if (!appStarted) {
        appStarted = true;
        initResizableLayout();
        await iniciarApp();
      } else {
        // Ao entrar novamente sem recarregar a página,

        state.selectedId = null;

        render();

    async function fazerLogin() {
      const matricula = loginUsuario.value.trim().toLowerCase();
      const senha = loginSenha.value;

      if (!matricula || !senha) {
        loginError.textContent = "Informe matrícula e senha.";
        return;
      }

      loginError.textContent = "Entrando...";

      const { data, error } = await db.auth.signInWithPassword({
        email: matriculaParaEmail(matricula),
        password: senha
      });

      if (error) {
        console.error(error);
        loginError.textContent = "Matrícula ou senha inválida.";
        loginSenha.value = "";
        loginSenha.focus();
        return;
      }

      try {
        await iniciarComUsuarioAutenticado(data.user);
        loginError.textContent = "";
      } catch (profileError) {
        console.error(profileError);
        await db.auth.signOut();
        loginError.textContent = profileError.message;
        mostrarTelaLogin();
      }
    }

    async function fazerLogout() {

      currentProfile.value = "";
      currentUserDisplay.textContent = "";

      // Limpa o termo aberto na memória da aba.
      state.selectedId = null;
      reviewMode = false;

      render();

      mostrarTelaLogin();

    async function initAuth() {

      const { data, error } = await db.auth.getSession();

      if (error) {
        console.error(error);
        mostrarTelaLogin();
        return;
      }

      if (data.session?.user) {
        try {
          await iniciarComUsuarioAutenticado(data.session.user);
        } catch (profileError) {
          console.error(profileError);
          await db.auth.signOut();
          mostrarTelaLogin();
        }
      } else {
        mostrarTelaLogin();
      }
    }

    function normalizeReview(term) {
      const valid = [REVIEW_ORIGINAL, REVIEW_MODIFICADO, REVIEW_NOVO, REVIEW_EXCLUIR];
      if (valid.includes(term.revisao)) return term.revisao;
      if (term.status === "candidato") return REVIEW_NOVO;
      return REVIEW_ORIGINAL;
    }

    function normalizeState(payload) {
      let parsed = payload;

      if (typeof parsed === "string") {
        try {
          parsed = JSON.parse(parsed);
        } catch {
          parsed = null;
        }
      }

      if (!parsed || typeof parsed !== "object" || !Array.isArray(parsed.terms)) {
        return structuredClone(exemplo);
      }

      parsed.comments = (Array.isArray(parsed.comments) ? parsed.comments : []).map(comment => ({
        id: String(comment.id || uid("comment")),
        termId: comment.termId ? String(comment.termId) : "",
        author: comment.author || "Usuário",
        text: comment.text || "",
        createdAt: comment.createdAt || "",
        resolved: comment.resolved === true,
        resolvedBy: comment.resolvedBy || null,
        resolvedAt: comment.resolvedAt || null,
        visto: comment.visto === true,
        vistoPor: comment.vistoPor || "",
        vistoEm: comment.vistoEm || "",
        replies: Array.isArray(comment.replies)
          ? comment.replies.map(reply => ({
            id: String(reply.id || uid("reply")),
            author: reply.author || "Usuário",
            text: reply.text || "",
            createdAt: reply.createdAt || ""

    }));

      parsed.actionHistory = (Array.isArray(parsed.actionHistory) ? parsed.actionHistory : []).map(action => ({

        decididoEm: action.decididoEm || "",
        justificativa: action.justificativa || "",
        resumo: Array.isArray(action.resumo) ? action.resumo.map(String) : [],
        original: action.original && typeof action.original === "object" ? action.original : null,
        final: action.final && typeof action.final === "object" ? action.final : null,
        sthStatus: action.sthStatus || "nao_aplicavel",
        sthFeitoPor: action.sthFeitoPor || "",
        sthFeitoEm: action.sthFeitoEm || ""
      }));

    parsed.expanded = Array.isArray(parsed.expanded) ? parsed.expanded.map(String) : [];
    parsed.icmgSourceVersion = parsed.icmgSourceVersion || "";
    parsed.icmgSourceImportedAt = parsed.icmgSourceImportedAt || "";

      parsed.terms = parsed.terms.map(term => ({
        id: String(term.id || uid("term")),
        parentId: term.parentId ? String(term.parentId) : null,
        termo: term.termo || "Sem termo",
        termoAnterior: term.termoAnterior || "",
        conceito: term.conceito || "",

        notaUso: term.notaUso || "",

        relacionadosNaoAutorizados: Array.isArray(term.relacionadosNaoAutorizados)
            ? term.relacionadosNaoAutorizados.map(String)
            : [],
        revisao: normalizeReview(term),
        original: term.original && typeof term.original === "object" ? {
          parentId: term.original.parentId ? String(term.original.parentId) : null,
          termo: term.original.termo || "",
          termoAnterior: term.original.termoAnterior || "",
          conceito: term.original.conceito || "",
          definicao: term.original.definicao || "",
          notaEscopo: term.original.notaEscopo || "",

            ? term.original.relacionadosNaoAutorizados.map(String)

        } : null,
        revisaoPor: term.revisaoPor || "",
        revisaoEm: term.revisaoEm || "",
        pendingChanges: Array.isArray(term.pendingChanges)
          ? term.pendingChanges.map(change => ({
              id: String(change.id || uid("change")),
              termId: change.termId ? String(change.termId) : String(term.id || ""),

    function uid(prefix = "id") {
      return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function nowLabel() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");

    function formatDateTimeBr(value) {
      const text = String(value || "").trim();

      if (!text) return "";

      // Já está no padrão brasileiro: dd-mm-aaaa HH:mm
      if (/^\d{2}-\d{2}-\d{4}/.test(text)) {
        return text;
      }

      // Converte: aaaa-mm-dd HH:mm
      const match = text.match(/^(\d{4})-(\d{2})-(\d{2})(.*)$/);

      if (match) {
        const [, year, month, day, rest] = match;
        return `${day}-${month}-${year}${rest || ""}`;
      }

      return text;
    }

    function parentKey(parentId) {
      return parentId ? String(parentId) : "__ROOT__";

    function buildIndexes() {
      termById = new Map();
      childrenByParent = new Map();
      termPathCache = new Map();

      for (const term of state.terms) {
        termById.set(String(term.id), term);

        const key = parentKey(term.parentId);

        if (!childrenByParent.has(key)) {
          childrenByParent.set(key, []);
        }

        childrenByParent.get(key).push(term);
      }

      for (const children of childrenByParent.values()) {
        children.sort((a, b) => a.termo.localeCompare(b.termo, "pt-BR"));
      }
    }

    function getTerm(id) {
      if (!id) return null;
      return termById.get(String(id)) || null;
    }

    function childrenOf(parentId) {
      return childrenByParent.get(parentKey(parentId)) || [];
    }

    function rootTermIds() {
      return state.terms

    function termPath(term) {
      if (!term) return "";

      const cacheKey = String(term.id);

      if (termPathCache.has(cacheKey)) {
        return termPathCache.get(cacheKey);
      }

      const parts = [];
      let current = term;
      const guard = new Set();

      while (current && !guard.has(current.id)) {
        guard.add(current.id);
        parts.push(displayTermName(current));
        current = getTerm(current.parentId);
      }

      const path = parts.reverse().join(" / ");
      termPathCache.set(cacheKey, path);

      return path;
    }

    function snapshotTerm(term) {
      return {
        parentId: term.parentId || null,
        termo: term.termo || "",
        termoAnterior: term.termoAnterior || "",
        conceito: term.conceito || "",
        definicao: term.definicao || "",
        notaEscopo: term.notaEscopo || "",
        notaUso: term.notaUso || "",
        relacionados: Array.isArray(term.relacionados) ? [...term.relacionados] : [],
        relacionadosNaoAutorizados: Array.isArray(term.relacionadosNaoAutorizados)
          ? [...term.relacionadosNaoAutorizados]
          : []
      };
    }

    function cloneRawValue(value) {
          if (Array.isArray(value)) return [...value];
          if (value === undefined || value === null) return null;
          return String(value);
        }

        function sameRawValue(a, b) {
          return JSON.stringify(cloneRawValue(a)) === JSON.stringify(cloneRawValue(b));
        }

        function fieldTitleForPending(field) {
          const titles = {
            termo: "Nome alterado",
            parentId: "Termo geral alterado",
            definicao: "Definição alterada",
            notaEscopo: "Nota Explicativa alterada",
            notaUso: "Nota Histórica alterada"
          };

          return titles[field] || "Alteração registrada";
        }

        function displayValueForPending(field, value) {
          if (field === "parentId") {
            return getTermNameForSummary(value);
          }

          if (Array.isArray(value)) {
            return value.join("; ");
          }

          return String(value || "");
        }

        function registerPendingFieldChange(term, field, beforeValue, suggestedValue) {
          if (!term) return;

          // Termo novo já aparece como pendência integral.
          // Exclusão sugerida também não precisa gerar alteração de campo.
          if (term.revisao === REVIEW_NOVO || term.revisao === REVIEW_EXCLUIR) {
            return;
          }

          term.pendingChanges = Array.isArray(term.pendingChanges) ? term.pendingChanges : [];

          const originalRaw = term.original && Object.prototype.hasOwnProperty.call(term.original, field)
            ? cloneRawValue(term.original[field])
            : cloneRawValue(beforeValue);

          const suggestedRaw = cloneRawValue(suggestedValue);

          const currentValue = displayValueForPending(field, originalRaw).trim();
          const suggestedDisplay = displayValueForPending(field, suggestedRaw).trim();

          if (currentValue === suggestedDisplay) {
            return;
          }

          const alreadyExists = term.pendingChanges.some(change =>
            change.field === field &&
            sameRawValue(change.currentRaw, originalRaw) &&
            sameRawValue(change.suggestedRaw, suggestedRaw)
          );

          if (alreadyExists) {
            return;
          }

          term.pendingChanges.push({
            id: uid("change"),
            termId: term.id,
            kind: field === "parentId" ? "parent" : "field",
            field,
            title: fieldTitleForPending(field),
            currentValue: currentValue || "—",
            suggestedValue: suggestedDisplay || "—",
            currentRaw: originalRaw,
            suggestedRaw,
            type: REVIEW_MODIFICADO,
            typeLabel: reviewLabel(REVIEW_MODIFICADO),
            author: currentUser.value.trim() || "Usuário",
            createdAt: nowLabel(),
            createdAtMs: Date.now()
          });
        }

        function removePendingChangeById(term, changeId) {
          if (!term || !Array.isArray(term.pendingChanges)) return;

          term.pendingChanges = term.pendingChanges.filter(change => change.id !== changeId);
        }

        function removePendingChangesForField(term, field) {
          if (!term || !Array.isArray(term.pendingChanges)) return;

          term.pendingChanges = term.pendingChanges.filter(change => change.field !== field);
        }

        function latestPendingChangeForField(term, field) {
          const changes = Array.isArray(term?.pendingChanges)
            ? term.pendingChanges.filter(change => change.field === field)
            : [];

          if (!changes.length) return null;

          return changes
            .slice()
            .sort((a, b) => Number(a.createdAtMs || 0) - Number(b.createdAtMs || 0))
            .at(-1);
        }

        function applyRawValueToTerm(term, field, value) {
          if (!term) return;

          if (field === "parentId") {
            term.parentId = value || null;
            return;
          }

          if (field === "relacionados" || field === "relacionadosNaoAutorizados") {
            term[field] = Array.isArray(value) ? [...value] : [];
            return;
          }

          term[field] = value === null || value === undefined ? "" : String(value);
        }

    function registerReviewMetadata(term) {
      term.revisaoPor = currentUser.value.trim() || "Usuário";
      term.revisaoEm = nowLabel();
    }

    function ensureOriginal(term) {
      if (!term || term.revisao === REVIEW_NOVO) return;
      if (!term.original) {
        term.original = snapshotTerm(term);
      }
    }

    function restoreTermFromOriginal(term) {
      if (!term || !term.original) return false;

      term.parentId = term.original.parentId || null;
      term.termo = term.original.termo || term.termo;
      term.termoAnterior = term.original.termoAnterior || "";
      term.conceito = term.original.conceito || "";
      term.definicao = term.original.definicao || "";
      term.notaEscopo = term.original.notaEscopo || "";
      term.notaUso = term.original.notaUso || "";
      term.relacionados = Array.isArray(term.original.relacionados) ? [...term.original.relacionados] : [];
      term.relacionadosNaoAutorizados = Array.isArray(term.original.relacionadosNaoAutorizados)
        ? [...term.original.relacionadosNaoAutorizados]
        : [];

      return true;
    }

    function clearReview(term) {
          if (!term) return;
          term.revisao = REVIEW_ORIGINAL;
          term.original = null;
          term.revisaoPor = "";
          term.revisaoEm = "";
          term.pendingChanges = [];
        }

    function markModified(term) {
      if (!term) return;
      if (term.revisao === REVIEW_NOVO || term.revisao === REVIEW_EXCLUIR) return;
      ensureOriginal(term);
      term.revisao = REVIEW_MODIFICADO;
      registerReviewMetadata(term);
    }

    function getPendingTerms() {
      const order = {
        [REVIEW_EXCLUIR]: 1,
        [REVIEW_NOVO]: 2,
        [REVIEW_MODIFICADO]: 3
      };

      return state.terms
        .filter(t => t.revisao && t.revisao !== REVIEW_ORIGINAL)
        .slice()
        .sort((a, b) => {
          const orderA = order[a.revisao] || 99;
          const orderB = order[b.revisao] || 99;
          if (orderA !== orderB) return orderA - orderB;
          return termPath(a).localeCompare(termPath(b), "pt-BR");
        });
    }

    function reviewLabel(revisao) {
      if (revisao === REVIEW_MODIFICADO) return "alterado";
      if (revisao === REVIEW_NOVO) return "novo";
      if (revisao === REVIEW_EXCLUIR) return "exclusão sugerida";
      return "original";
    }

    function pendingTerms() {
      return state.terms.filter(t => t.revisao && t.revisao !== REVIEW_ORIGINAL);
    }

    function pendingActionItems() {
      return getPendingTerms().flatMap(term => pendingChangeItems(term));
    }

    function pendingActionGroups() {
          const items = pendingActionItems();

          const groupsByTerm = new Map();

          items.forEach((item, index) => {
            const termId = item.termId || "";

            if (!groupsByTerm.has(termId)) {
              groupsByTerm.set(termId, {
                termId,
                firstIndex: index,
                firstTime: Number(item.createdAtMs || 0),
                items: []
              });
            }

            const group = groupsByTerm.get(termId);
            group.items.push(item);

            const itemTime = Number(item.createdAtMs || 0);
            if (!group.firstTime || (itemTime && itemTime < group.firstTime)) {
              group.firstTime = itemTime;
            }
          });

          return Array.from(groupsByTerm.values())
            .sort((a, b) => {
              const timeA = Number(a.firstTime || 0);
              const timeB = Number(b.firstTime || 0);

              if (timeA && timeB && timeA !== timeB) return timeA - timeB;
              if (timeA && !timeB) return -1;
              if (!timeA && timeB) return 1;

              return a.firstIndex - b.firstIndex;
            })
            .map(group => ({
              ...group,
              items: group.items.slice().sort((a, b) => {
                const timeA = Number(a.createdAtMs || 0);
                const timeB = Number(b.createdAtMs || 0);

                if (timeA && timeB && timeA !== timeB) return timeA - timeB;
                return String(a.createdAt || "").localeCompare(String(b.createdAt || ""), "pt-BR");
              })
            }));
}

    function unseenComments() {
      return state.comments.filter(comment => comment.visto !== true);
    }

    function managementCount() {
      return pendingActionItems().length + unseenComments().length;
    }

    function isTermPending(term) {
      return Boolean(term && term.revisao && term.revisao !== REVIEW_ORIGINAL);
    }

    function updateReviewTopButton() {
      if (!userCanAccessManagement()) {
        reviewTopBtn.style.display = "none";
        reviewMode = false;
        return;
      }

      reviewTopBtn.style.display = "";

      const count = managementCount();
      reviewTopBtn.textContent = `Gestão (${count})`;
      reviewTopBtn.classList.toggle("has-pending", count > 0);
    }

    function renderPendingArea() {
      renderManagementArea();
    }

          </div>

        <div class="toolbar management-header-actions">
          <button id="downloadHistoryPdfBtn">Baixar histórico (PDF)</button>
        </div>

        <div class="tabs">

        <div id="gestaoAcoes" class="panel ${managementTab === "acoes" ? "active" : ""}">

                <option value="aprovadas" ${managementActionFilter === "aprovadas" ? "selected" : ""}>Aprovadas</option>

              <select id="managementCommentFilter">

                <option value="vistos" ${managementCommentFilter === "vistos" ? "selected" : ""}>Vistos</option>
                <option value="todos" ${managementCommentFilter === "todos" ? "selected" : ""}>Todos</option>
              </select>
            </label>
          </div>

        </div>
      `;

      wireManagementArea();
    }

    function renderManagementActionsHtml() {
      if (managementActionFilter === "pendentes") {
          const groups = pendingActionGroups();

          if (!groups.length) {
            return '<div class="empty">Não há ações pendentes.</div>';
          }

          return `
            <div class="pending-list">
              ${groups.map(renderPendingTermGroupHtml).join("")}
            </div>
          `;
        }

      let actions = state.actionHistory.filter(action => {
        if (managementActionFilter === "aprovadas") return action.decisao === "aprovada";
        if (managementActionFilter === "rejeitadas") return action.decisao === "rejeitada";
        return false;
      });

      if (managementActionFilter === "aprovadas" && managementSthFilter !== "todas") {
        actions = actions.filter(action => action.sthStatus === managementSthFilter);
      }

      actions = actions
        .slice()
        .sort((a, b) => String(b.decididoEm).localeCompare(String(a.decididoEm)));

      }

      return `

    function renderActionHistoryItemHtml(action) {
      const termExists = action.termId && getTerm(action.termId);
      const aprovado = action.decisao === "aprovada";
      const aguardandoSth = aprovado && action.sthStatus !== "feito";

      return `
        <div class="pending-card review-${escapeAttr(action.tipo || REVIEW_ORIGINAL)}">
          <div class="pending-title">

          <div class="muted">${escapeHtml(action.caminho || "")}</div>

          }

          ${

              : ""
          }

          ${

              ? `<div class="muted">Feito no STH por ${escapeHtml(action.sthFeitoPor || "Usuário")} ${action.sthFeitoEm ? `em ${escapeHtml(formatDateTimeBr(action.sthFeitoEm))}` : ""}</div>`
              : ""
          }

          ${

              : ""
          }

          <div class="toolbar">
            ${termExists ? `<button data-history-action="view" data-term-id="${escapeAttr(action.termId)}">Ver termo</button>` : ""}
            ${aguardandoSth ? `<button class="success" data-history-action="mark-sth" data-action-id="${escapeAttr(action.id)}">Marcar como feito no STH</button>` : ""}

    function renderManagementCommentsHtml() {
      let comments = state.comments.slice();

      if (managementCommentFilter === "nao_vistos") {
        comments = comments.filter(comment => comment.visto !== true);
      } else if (managementCommentFilter === "vistos") {

      }

      if (!comments.length) {
        return '<div class="empty">Nenhum comentário encontrado para este filtro.</div>';

      return `
        <div class="pending-list">
          ${comments.map(renderManagementCommentHtml).join("")}
        </div>

    function renderManagementCommentHtml(comment) {
      const term = getTerm(comment.termId);
      const visto = comment.visto === true;

      return `
        <div class="comment-box ${comment.resolved ? "resolved" : ""}">
          <div class="comment-head">
            <div>
              <strong>${escapeHtml(term ? displayTermName(term) : "Termo não encontrado")}</strong>
              <div class="muted">${term ? escapeHtml(termPath(term)) : ""}</div>
            </div>

          </div>

          <div class="muted">

            ${comment.createdAt ? `em ${escapeHtml(formatDateTimeBr(comment.createdAt))}` : ""}
          </div>

          ${renderCommentRepliesHtml(comment)}

          ${

              ? `<div class="muted" style="margin-top: 6px;">Visto por ${escapeHtml(comment.vistoPor || "Usuário")} ${comment.vistoEm ? `em ${escapeHtml(formatDateTimeBr(comment.vistoEm))}` : ""}</div>`
              : ""
          }

          <div class="reply-box">
            <label class="muted" for="replyText-${escapeAttr(comment.id)}">Responder</label>
            <textarea id="replyText-${escapeAttr(comment.id)}" placeholder="Escreva uma resposta para este comentário..."></textarea>
          </div>

          <div class="toolbar">
            ${term ? `<button data-comment-management-action="view-term" data-term-id="${escapeAttr(comment.termId)}">Ver termo</button>` : ""}
            <button class="primary" data-comment-management-action="reply" data-comment-id="${escapeAttr(comment.id)}">Enviar resposta</button>
            ${!visto ? `<button class="success" data-comment-management-action="mark-seen" data-comment-id="${escapeAttr(comment.id)}">Marcar como visto</button>` : ""}
          </div>

    function wireManagementArea() {
      termArea.querySelectorAll("[data-management-tab]").forEach(tab => {
        tab.onclick = () => {
          managementTab = tab.dataset.managementTab;
          render();
        };
      });

      const downloadHistoryPdfBtn = document.getElementById("downloadHistoryPdfBtn");
      if (downloadHistoryPdfBtn) {
        downloadHistoryPdfBtn.onclick = downloadHistoryPdf;
      }

      const actionFilter = document.getElementById("managementActionFilter");
      if (actionFilter) {
        actionFilter.onchange = () => {
          managementActionFilter = actionFilter.value;
          render();
        };
      }

      const sthFilter = document.getElementById("managementSthFilter");
      if (sthFilter) {
        sthFilter.onchange = () => {
          managementSthFilter = sthFilter.value;
          render();
        };
      }

      const commentFilter = document.getElementById("managementCommentFilter");
      if (commentFilter) {
        commentFilter.onchange = () => {
          managementCommentFilter = commentFilter.value;
          render();
        };
      }

      termArea.querySelectorAll("[data-pending-action]").forEach(btn => {
        btn.onclick = async () => {
          const termId = btn.dataset.termId;
          const action = btn.dataset.pendingAction;

          if (action === "view") {
            state.selectedId = termId;
            reviewMode = false;
            render();
            return;
          }

          if (action === "approve-change") {
            await approvePendingChange(btn.dataset.changeId);
            return;
          }

          if (action === "reject-change") {
            await rejectPendingChange(btn.dataset.changeId);
            return;
          }

          if (action === "approve") {
            await approvePending(termId);
            return;
          }

          if (action === "reject") {
            await rejectPending(termId);
            return;
          }
        };
      });

      termArea.querySelectorAll("[data-history-action]").forEach(btn => {
        btn.onclick = async () => {
          const action = btn.dataset.historyAction;

          if (action === "view") {
            state.selectedId = btn.dataset.termId;
            reviewMode = false;
            render();
            return;
          }

          if (action === "mark-sth") {
            await marcarFeitoNoSth(btn.dataset.actionId);
          }
        };
      });

      termArea.querySelectorAll("[data-comment-management-action]").forEach(btn => {
        btn.onclick = async () => {
          const action = btn.dataset.commentManagementAction;

          if (action === "view-term") {
            state.selectedId = btn.dataset.termId;
            reviewMode = false;
            render();
            setActiveTab("comentarios");
            return;
          }

          if (action === "mark-seen") {
            await marcarComentarioComoVisto(btn.dataset.commentId);
            return;
          }

          if (action === "reply") {
            await responderComentario(btn.dataset.commentId);
            return;
          }
        };
      });
    }

    async function marcarComentarioComoVisto(commentId) {
      const comment = state.comments.find(item => item.id === commentId);
      if (!comment) return;

      comment.visto = true;
      comment.vistoPor = currentUser.value.trim() || "Usuário";
      comment.vistoEm = nowLabel();

      await saveState();
      render();
    }

    async function responderComentario(commentId) {
      const comment = state.comments.find(item => item.id === commentId);
      if (!comment) return;

      const textarea = document.getElementById(`replyText-${commentId}`);
      const text = textarea ? textarea.value.trim() : "";

      if (!text) {
        alert("Escreva uma resposta antes de enviar.");
        return;
      }

      comment.replies = Array.isArray(comment.replies) ? comment.replies : [];

      comment.replies.push({
        id: uid("reply"),
        author: currentUser.value.trim() || "Usuário",
        text,
        createdAt: nowLabel()
      });

      comment.visto = true;
      comment.vistoPor = currentUser.value.trim() || "Usuário";
      comment.vistoEm = nowLabel();

      await saveState();
      render();
    }

function renderPendingChangeItemHtml(change) {

      </div>

}


function normalizeDiffValue(value) {
  return String(value || "").trim();
}

function renderPendingTermGroupHtml(group) {

  return `
    <div class="relation-box">
      <div class="comment-head">
        <div>
          <strong>${escapeHtml(term ? displayTermName(term) : "Termo não encontrado")}</strong>
          <div class="muted">${term ? escapeHtml(termPath(term)) : ""}</div>

        <span class="review-badge modificado">${group.items.length} alteração(ões)</span>

      <div class="pending-list">
        ${group.items.map(renderPendingChangeInGroupHtml).join("")}

function renderPendingChangeInGroupHtml(change) {

}

function sameList(a, b) {
  return JSON.stringify((a || []).map(String)) === JSON.stringify((b || []).map(String));
}

function listAddedItems(originalList, currentList) {
  const originalSet = new Set((originalList || []).map(String));
  return (currentList || []).map(String).filter(item => !originalSet.has(item));
}

function listRemovedItems(originalList, currentList) {
  const currentSet = new Set((currentList || []).map(String));
  return (originalList || []).map(String).filter(item => !currentSet.has(item));
}

function changeTextForHistory(change) {
  if (change.kind === "field" || change.kind === "parent") {
    return `${change.title}\nAtual: ${change.currentValue || "—"}\nSugestão: ${change.suggestedValue || "—"}`;
  }

  return change.title;
}

function renderChangeSummaryHtml(change) {
  if (change.kind === "field" || change.kind === "parent") {
    return `
      <div class="change-summary">
        <div class="change-summary-title">${escapeHtml(change.title)}</div>

        <div class="change-summary-block">
          <span class="change-summary-label">Atual:</span>
          <div class="change-summary-text">${escapeHtml(change.currentValue || "—")}</div>
        </div>

        <div class="change-summary-block">
          <span class="change-summary-label">Sugestão:</span>
          <div class="change-summary-text">${escapeHtml(change.suggestedValue || "—")}</div>
        </div>
      </div>
    `;
  }

  return `
    <div class="change-summary">
      <div class="change-summary-title">${escapeHtml(change.title)}</div>
    </div>
  `;
}

function pendingChangeItems(term) {
  if (!term || !isTermPending(term)) return [];

  if (term.revisao === REVIEW_NOVO) {
    return [{
      id: `${term.id}::novo`,
      termId: term.id,
      kind: "whole-new",
      title: `Novo termo: ${term.termo || "—"}`,
      type: term.revisao,
      typeLabel: reviewLabel(term.revisao),
      author: term.revisaoPor || "Usuário",
      createdAt: term.revisaoEm || "",
      createdAtMs: 0
    }];
  }

  if (term.revisao === REVIEW_EXCLUIR) {
    return [{
      id: `${term.id}::excluir`,
      termId: term.id,
      kind: "whole-delete",
      title: "Exclusão sugerida para este termo.",
      type: term.revisao,
      typeLabel: reviewLabel(term.revisao),
      author: term.revisaoPor || "Usuário",
      createdAt: term.revisaoEm || "",
      createdAtMs: 0
    }];
  }

  const registeredChanges = Array.isArray(term.pendingChanges)
    ? term.pendingChanges
    : [];

  if (registeredChanges.length) {
    return registeredChanges.map(change => ({
      ...change,
      termId: term.id,
      type: change.type || REVIEW_MODIFICADO,
      typeLabel: change.typeLabel || reviewLabel(REVIEW_MODIFICADO)
    }));
  }

  // Compatibilidade com dados antigos que ainda não têm pendingChanges.
  const original = term.original;
  if (!original) {
    return [{
      id: `${term.id}::sem-original`,
      termId: term.id,
      kind: "unknown",
      title: "Alteração registrada sem cópia anterior disponível.",
      type: term.revisao,
      typeLabel: reviewLabel(term.revisao),
      author: term.revisaoPor || "Usuário",
      createdAt: term.revisaoEm || "",
      createdAtMs: 0
    }];
  }

  const changes = [];

  function addFieldChange(field, title, currentValue, suggestedValue) {
    const atual = normalizeDiffValue(currentValue);
    const sugestao = normalizeDiffValue(suggestedValue);

    if (atual === sugestao) return;

    changes.push({
      id: `${term.id}::field::${field}`,
      termId: term.id,
      kind: "field",
      field,
      title,
      currentValue: atual || "—",
      suggestedValue: sugestao || "—",
      currentRaw: cloneRawValue(currentValue),
      suggestedRaw: cloneRawValue(suggestedValue),
      type: term.revisao,
      typeLabel: reviewLabel(term.revisao),
      author: term.revisaoPor || "Usuário",
      createdAt: term.revisaoEm || "",
      createdAtMs: 0
    });
  }

  addFieldChange("termo", "Nome alterado", original.termo, term.termo);

  if ((original.parentId || null) !== (term.parentId || null)) {
    changes.push({
      id: `${term.id}::parent`,
      termId: term.id,
      kind: "parent",
      field: "parentId",
      title: "Termo geral alterado",
      currentValue: getTermNameForSummary(original.parentId),
      suggestedValue: getTermNameForSummary(term.parentId),
      currentRaw: cloneRawValue(original.parentId),
      suggestedRaw: cloneRawValue(term.parentId),
      type: term.revisao,
      typeLabel: reviewLabel(term.revisao),
      author: term.revisaoPor || "Usuário",
      createdAt: term.revisaoEm || "",
      createdAtMs: 0
    });
  }

  addFieldChange("definicao", "Definição alterada", original.definicao, term.definicao);
  addFieldChange("notaEscopo", "Nota Explicativa alterada", original.notaEscopo, term.notaEscopo);
  addFieldChange("notaUso", "Nota Histórica alterada", original.notaUso, term.notaUso);

  return changes;
}

function listAddedItems(originalList, currentList) {
  const originalSet = new Set((originalList || []).map(String));
  return (currentList || []).map(String).filter(item => !originalSet.has(item));
}

function listRemovedItems(originalList, currentList) {
  const currentSet = new Set((currentList || []).map(String));
  return (originalList || []).map(String).filter(item => !currentSet.has(item));
}

function formatTermIdList(ids) {
  return (ids || []).map(getTermNameForSummary).join("; ") || "—";
}

function formatTextList(values) {
  return (values || []).join("; ") || "—";
}

function relationshipChangeLines(options) {
  const {
    originalList,
    currentList,
    singularLabel,
    pluralLabel,
    formatter
  } = options;

  const original = Array.isArray(originalList) ? originalList.map(String) : [];
  const current = Array.isArray(currentList) ? currentList.map(String) : [];

  if (JSON.stringify(original) === JSON.stringify(current)) {
    return [];
  }

  const added = listAddedItems(original, current);
  const removed = listRemovedItems(original, current);

  const lines = [];

  if (added.length && !removed.length) {
    for (const item of added) {
      lines.push(`${singularLabel} adicionado: ${formatter([item])}`);
    }
    return lines;
  }

  if (removed.length && !added.length) {
    for (const item of removed) {
      lines.push(`${singularLabel} sugerido para retirada: ${formatter([item])}`);
    }
    return lines;
  }

  lines.push(
    `${pluralLabel} alterados:\nAtual: ${formatter(original)}\nSugestão: ${formatter(current)}`
  );

  return lines;
}

  }

  return changes.map(renderChangeSummaryHtml).join("");

    function hasMatchingDescendant(term, query) {
      if (!query) return true;
      if (matchesTerm(term, query)) return true;
      return childrenOf(term.id).some(child => hasMatchingDescendant(child, query));
    }

    function matchesTerm(term, query) {
      const normalizedQuery = normalizeSearchText(query);

      if (!normalizedQuery) return true;

      const upTerms = Array.isArray(term.relacionadosNaoAutorizados)
        ? term.relacionadosNaoAutorizados
        : [];

      const text = [
        term.termo,
        term.termoAnterior,
        term.conceito,
        term.definicao,
        term.notaEscopo,
        term.notaUso,
        ...upTerms
      ].join(" ");

      return normalizeSearchText(text).includes(normalizedQuery);
    }

    function matchingUpValues(term, query) {
      const normalizedQuery = normalizeSearchText(query);

      if (!normalizedQuery) return [];

      const upTerms = Array.isArray(term.relacionadosNaoAutorizados)
        ? term.relacionadosNaoAutorizados
        : [];

      return upTerms.filter(up => normalizeSearchText(up).includes(normalizedQuery));
     }

    function canMoveTerm(dragId, newParentId) {
      if (!dragId) return false;
      if (dragId === newParentId) return false;

      let current = getTerm(newParentId);
      const guard = new Set();

      while (current && !guard.has(current.id)) {
        guard.add(current.id);
        if (current.id === dragId) return false;
        current = getTerm(current.parentId);
      }

      return true;
    }

    async function moveTerm(dragId, newParentId) {
      const term = getTerm(dragId);
      if (!term) return;

      const finalParentId = newParentId || null;

      if (!canMoveTerm(dragId, finalParentId)) {
        alert("Movimento inválido: não é possível mover um termo para dentro dele mesmo ou de um descendente.");
        return;
      }

      if (term.parentId === finalParentId) return;

      ensureOriginal(term);
      term.parentId = finalParentId;
      markModified(term);

      if (finalParentId && !state.expanded.includes(finalParentId)) {
        state.expanded.push(finalParentId);
      }

      state.selectedId = term.id;
      await saveState();
      render();
    }

    function renderTree() {
      const query = searchInput.value.trim();
      treeEl.innerHTML = "";

      const rootDrop = document.createElement("div");
      rootDrop.className = "root-drop";
      rootDrop.textContent = "Solte aqui para mover para a raiz";
      rootDrop.addEventListener("dragover", e => {
        e.preventDefault();
        rootDrop.classList.add("drag-over");
      });
      rootDrop.addEventListener("dragleave", () => rootDrop.classList.remove("drag-over"));
      rootDrop.addEventListener("drop", async e => {
        e.preventDefault();
        rootDrop.classList.remove("drag-over");
        if (draggedTermId) await moveTerm(draggedTermId, null);
        draggedTermId = null;
      });
      treeEl.appendChild(rootDrop);

      const roots = childrenOf(null);

      if (!roots.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Nenhum termo cadastrado.";
        treeEl.appendChild(empty);
        return;
      }

      roots.forEach(root => renderTreeNode(root, 0, query));
    }

    function renderTreeNode(term, level, query) {
      if (query && !hasMatchingDescendant(term, query)) return;

      const children = childrenOf(term.id);
      const expanded = state.expanded.includes(term.id) || Boolean(query);
      const item = document.createElement("div");
      item.className = `tree-item review-${term.revisao || REVIEW_ORIGINAL}` + (term.id === state.selectedId ? " selected" : "");
      item.style.paddingLeft = `${level * 18 + 4}px`;
      item.draggable = true;
      item.title = "Arraste para mover este termo para outra hierarquia";

      item.addEventListener("dragstart", e => {
        draggedTermId = term.id;
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", term.id);
      });

      item.addEventListener("dragover", e => {
        e.preventDefault();
        item.classList.add("drag-over");
      });

      item.addEventListener("dragleave", () => item.classList.remove("drag-over"));

      item.addEventListener("drop", async e => {
        e.preventDefault();
        e.stopPropagation();
        item.classList.remove("drag-over");
        const draggedId = e.dataTransfer.getData("text/plain") || draggedTermId;
        await moveTerm(draggedId, term.id);
        draggedTermId = null;
      });

      item.addEventListener("dragend", () => {
        draggedTermId = null;
        document.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));
      });

      const toggle = document.createElement("button");
      toggle.className = "toggle";
      toggle.textContent = children.length ? (expanded ? "▾" : "▸") : "•";
      toggle.title = expanded ? "Recolher" : "Expandir";
      toggle.onclick = (e) => {
        e.stopPropagation();
        if (!children.length) return;

        if (state.expanded.includes(term.id)) {
          state.expanded = state.expanded.filter(id => id !== term.id);
        } else {
          state.expanded.push(term.id);
        }

        renderTree();
      };

      const label = document.createElement("button");
      label.className = "term-label";
      label.textContent = displayTermName(term);;
      label.onclick = () => {
        state.selectedId = term.id;
        reviewMode = false;
        render();
      };

      item.appendChild(toggle);
      item.appendChild(label);

      const upMatches = matchingUpValues(term, query);

      if (upMatches.length) {
        const upBadge = document.createElement("span");
        upBadge.className = "search-match-badge";
        upBadge.textContent = `UP: ${upMatches[0]}${upMatches.length > 1 ? ` +${upMatches.length - 1}` : ""}`;
        upBadge.title = upMatches.join("; ");
        item.appendChild(upBadge);
      }

      if (term.revisao && term.revisao !== REVIEW_ORIGINAL) {
        const badge = document.createElement("span");
        badge.className = `review-badge ${term.revisao}`;
        badge.textContent = reviewLabel(term.revisao);
        item.appendChild(badge);
      }

      treeEl.appendChild(item);

      if (expanded) {
        const childQuery = query && matchesTerm(term, query) ? "" : query;
        children.forEach(child => renderTreeNode(child, level + 1, childQuery));
      }
    }

      const options = ['<option value="">Sem termo geral</option>'];

        .filter(t => t.id !== currentId && t.revisao !== REVIEW_EXCLUIR && !isDescendantOf(t.id, currentId))

    function isDescendantOf(candidateId, possibleAncestorId) {
      let current = getTerm(candidateId);
      const guard = new Set();

      while (current && current.parentId && !guard.has(current.id)) {
        guard.add(current.id);

        if (current.parentId === possibleAncestorId) {
          return true;
        }

        current = getTerm(current.parentId);
      }

      return false;
    }

        .filter(t => t.id !== currentId && t.revisao !== REVIEW_EXCLUIR)
        .slice()
        .sort((a, b) => termPath(a).localeCompare(termPath(b), "pt-BR"))
        .forEach(t => {
          options.push(`<option value="${escapeAttr(t.id)}">${escapeHtml(termPath(t))}</option>`);
        });

      return options.join("");
    }

    function renderTermDatalist(datalistId, excludeIds = []) {
      const excluded = new Set(excludeIds.map(String));

      return `
        <datalist id="${escapeAttr(datalistId)}">
          ${state.terms
            .filter(t => t.revisao !== REVIEW_EXCLUIR && !excluded.has(String(t.id)))
            .slice()
            .sort((a, b) => a.termo.localeCompare(b.termo, "pt-BR"))
            .map(t => `<option value="${escapeAttr(t.termo)}"></option>`)
            .join("")}
        </datalist>
      `;
    }

        function findTermIdByTypedValue(value) {
          const raw = String(value || "").trim();
          const typed = normalizeSearchText(raw);

          if (!typed) return null;

          const candidates = state.terms
            .filter(t => t.revisao !== REVIEW_EXCLUIR)
            .map(t => ({
              term: t,
              termoOriginal: String(t.termo || "").trim(),
              termoNormalizado: normalizeSearchText(t.termo),
              caminhoNormalizado: normalizeSearchText(termPath(t))
            }));

          // 1. Nome oficial exatamente igual, considerando maiúsculas/minúsculas.
          const exactOriginal = candidates.find(item =>
            item.termoOriginal.toLowerCase() === raw.toLowerCase()
          );

          if (exactOriginal) return exactOriginal.term.id;

          // 2. Nome normalizado exatamente igual.
          const exactNameMatches = candidates.filter(item =>
            item.termoNormalizado === typed
          );

          if (exactNameMatches.length === 1) {
            return exactNameMatches[0].term.id;
          }

          // 3. Caminho normalizado exatamente igual.
          const exactPathMatches = candidates.filter(item =>
            item.caminhoNormalizado === typed
          );

          if (exactPathMatches.length === 1) {
            return exactPathMatches[0].term.id;
          }

          // 4. Começa com o texto digitado.
          const startsWithNameMatches = candidates.filter(item =>
            item.termoNormalizado.startsWith(typed)
          );

          if (startsWithNameMatches.length === 1) {
            return startsWithNameMatches[0].term.id;
          }

          // 5. Contém o texto digitado.
          const includesNameMatches = candidates.filter(item =>
            item.termoNormalizado.includes(typed)
          );

          if (includesNameMatches.length === 1) {
            return includesNameMatches[0].term.id;
          }

          // 6. Contém no caminho.
          const includesPathMatches = candidates.filter(item =>
            item.caminhoNormalizado.includes(typed)
          );

          if (includesPathMatches.length === 1) {
            return includesPathMatches[0].term.id;
          }

          return null;
        }

    function termSearchCandidates(query, excludeIds = []) {
      const typed = normalizeSearchText(query);
      const excluded = new Set(excludeIds.map(String));

      if (!typed) return [];

      return state.terms
        .filter(term =>
          term.revisao !== REVIEW_EXCLUIR &&
          !excluded.has(String(term.id))
        )
        .map(term => {
          const termoNormalizado = normalizeSearchText(term.termo);
          const caminhoNormalizado = normalizeSearchText(termPath(term));

          let score = 99;

          if (termoNormalizado === typed) {
            score = 1;
          } else if (termoNormalizado.startsWith(typed)) {
            score = 2;
          } else if (termoNormalizado.includes(typed)) {
            score = 3;
          } else if (caminhoNormalizado.includes(typed)) {
            score = 4;
          }

          return { term, score };
        })
        .filter(item => item.score < 99)
        .sort((a, b) => {
          if (a.score !== b.score) return a.score - b.score;
          return a.term.termo.localeCompare(b.term.termo, "pt-BR");
        })
        .slice(0, 30)
        .map(item => item.term);
    }

    function setupTermAutocomplete(inputId, boxId, excludeIds = []) {
      const input = document.getElementById(inputId);
      const box = document.getElementById(boxId);

      if (!input || !box) return;

      function hideBox() {
        box.classList.add("hidden");
      }

      function showSuggestions() {
        const query = input.value.trim();
        input.dataset.termId = "";

        if (!query) {
          hideBox();
          return;
        }

        const matches = termSearchCandidates(query, excludeIds);

        if (!matches.length) {
          box.innerHTML = '<div class="term-suggest-empty">Nenhum termo encontrado.</div>';
          box.classList.remove("hidden");
          return;
        }

        box.innerHTML = matches
          .map(term => `
            <button type="button"
                    class="term-suggest-option"
                    data-term-id="${escapeAttr(term.id)}">
              ${escapeHtml(term.termo)}
            </button>
          `)
          .join("");

        box.classList.remove("hidden");

        box.querySelectorAll("[data-term-id]").forEach(option => {
          option.onclick = () => {
            const selectedTerm = getTerm(option.dataset.termId);

            if (!selectedTerm) return;

            input.value = selectedTerm.termo;
            input.dataset.termId = selectedTerm.id;
            hideBox();
          };
        });
      }

      input.addEventListener("input", showSuggestions);
      input.addEventListener("focus", showSuggestions);

      input.addEventListener("keydown", event => {
        if (event.key === "Escape") {
          hideBox();
        }
      });

      input.addEventListener("blur", () => {
        setTimeout(hideBox, 150);
      });
    }

    function getTermIdFromSearchInput(input) {
      if (!input) return null;

      if (input.dataset.termId) {
        return input.dataset.termId;
      }

      return findTermIdByTypedValue(input.value);
    }

    function addUniqueValue(list, value) {
      if (!Array.isArray(list)) list = [];
      if (!list.includes(value)) list.push(value);
      return list;
    }

    function removeValue(list, value) {
      return (Array.isArray(list) ? list : []).filter(item => item !== value);
    }

    function removeValueAtIndex(list, index) {
      return (Array.isArray(list) ? list : []).filter((_, i) => i !== index);
    }

    function addAuthorizedRelation(term, relatedId) {
      const other = getTerm(relatedId);
      if (!term || !other || term.id === other.id) return false;

      ensureOriginal(term);
      ensureOriginal(other);

      term.relacionados = addUniqueValue(term.relacionados, other.id);
      other.relacionados = addUniqueValue(other.relacionados, term.id);

      markModified(term);
      markModified(other);

      return true;
    }

    function removeAuthorizedRelation(term, relatedId) {
      const other = getTerm(relatedId);
      if (!term || !other) return false;

      ensureOriginal(term);
      ensureOriginal(other);

      term.relacionados = removeValue(term.relacionados, relatedId);
      other.relacionados = removeValue(other.relacionados, term.id);

      markModified(term);
      markModified(other);

      return true;
    }

    function addUnauthorizedRelation(term, value) {
      const upValue = String(value || "").trim();

      if (!term || !upValue) return false;

      term.relacionadosNaoAutorizados = Array.isArray(term.relacionadosNaoAutorizados)
        ? term.relacionadosNaoAutorizados
        : [];

      const newKey = normalizeUpDuplicateKey(upValue);

      const alreadyExists = term.relacionadosNaoAutorizados.some(existing =>
        normalizeUpDuplicateKey(existing) === newKey
      );

      if (alreadyExists) {
        alert(`Este UP já existe neste termo: "${upValue}".`);
        return false;
      }

      ensureOriginal(term);

      term.relacionadosNaoAutorizados.push(upValue);

      markModified(term);
      return true;
    }

    function editUnauthorizedRelation(term, index, newValue) {
      if (!term || !newValue) return false;

      const list = Array.isArray(term.relacionadosNaoAutorizados)
        ? term.relacionadosNaoAutorizados
        : [];

      if (!list[index]) return false;

      ensureOriginal(term);

      list[index] = newValue;
      term.relacionadosNaoAutorizados = list;

      markModified(term);
      return true;
    }

    function removeUnauthorizedRelation(term, index) {
      if (!term) return false;

      const list = Array.isArray(term.relacionadosNaoAutorizados)
        ? term.relacionadosNaoAutorizados
        : [];

      if (!list[index]) return false;

      ensureOriginal(term);

      term.relacionadosNaoAutorizados = removeValueAtIndex(list, index);

      markModified(term);
      return true;
    }

    function moveUnauthorizedRelation(term, index, targetTermId) {
      const target = getTerm(targetTermId);

      if (!term || !target || term.id === target.id) return false;

      const list = Array.isArray(term.relacionadosNaoAutorizados)
        ? term.relacionadosNaoAutorizados
        : [];

      const value = list[index];
      if (!value) return false;

      ensureOriginal(term);
      ensureOriginal(target);

      term.relacionadosNaoAutorizados = removeValueAtIndex(list, index);

      target.relacionadosNaoAutorizados = Array.isArray(target.relacionadosNaoAutorizados)
        ? target.relacionadosNaoAutorizados
        : [];

      const valueKey = normalizeUpDuplicateKey(value);

      const targetAlreadyHasValue = target.relacionadosNaoAutorizados.some(existing =>
        normalizeUpDuplicateKey(existing) === valueKey
      );

      if (targetAlreadyHasValue) {
        alert(`O termo de destino já possui o UP "${value}".`);
        return false;
}

target.relacionadosNaoAutorizados.push(value);

markModified(term);
markModified(target);

return true;
    }

    function renderCommentHtml(c) {
      const statusClass = c.resolved ? "resolved" : "open";

      return `

            <span class="status-pill ${statusClass}">${statusLabel}</span>
