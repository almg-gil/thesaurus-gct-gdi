<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tesauro GCT-GDI</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --border: #d8d8d8;
      --muted: #666;
      --soft: #f7f7f7;
      --selected: #e8f0fe;
      --blue: #1f5fbf;
      --green: #1f7a3a;
      --red: #a83232;
      --blue-bg: #edf4ff;
      --green-bg: #edf8f0;
      --red-bg: #fff0f0;
      --left-width: 540px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      color: #111;
      background: white;
    }

    header {
      height: 42px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: #fff;
    }

    header strong { font-size: 15px; }

    header .user-area {
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .top-actions {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .review-top-btn {
      font-weight: bold;
      border-color: var(--border);
    }

    .review-top-btn.has-pending {
      border-color: var(--red);
      color: var(--red);
      background: var(--red-bg);
    }

    body.logged-out header,
    body.logged-out .app {
      display: none;
    }

    body.logged-in #loginScreen {
      display: none;
    }

    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }

    .login-card {
      width: min(380px, calc(100vw - 32px));
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 22px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .login-card h1 {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: normal;
    }

    .login-card .field {
      margin-top: 14px;
    }

    .login-card button {
      width: 100%;
      margin-top: 10px;
    }

    .login-error {
      color: var(--red);
      min-height: 18px;
      margin: 10px 0 0;
      font-size: 13px;
    }

    .user-name-display {
      color: #111;
      font-weight: bold;
    }

    .profile-display {
      color: var(--muted);
    }

    .logout-btn {
      margin-left: 6px;
    }

    input, textarea, select, button { font: inherit; }

    button {
      cursor: pointer;
      border: 1px solid var(--border);
      background: #fff;
      padding: 5px 8px;
      border-radius: 4px;
    }

    button:hover { background: #f3f3f3; }

    button.primary {
      border-color: var(--blue);
      color: white;
      background: var(--blue);
    }

    button.danger {
      border-color: #c9a0a0;
      color: var(--red);
    }

    button.success {
      border-color: #9ac9a5;
      color: var(--green);
    }

    .app {
      height: calc(100vh - 42px);
      display: grid;
      grid-template-columns: var(--left-width) 7px 1fr;
    }

    .left {
      border-right: 1px solid var(--border);
      padding: 10px;
      overflow: auto;
      background: #fff;
    }

    .splitter {
      cursor: col-resize;
      background: #f4f4f4;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .splitter:hover,
    .splitter.resizing {
      background: var(--selected);
    }

    body.resizing {
      cursor: col-resize;
      user-select: none;
    }

    .tree-box {
      overflow: auto;
    }

    .right {
      padding: 10px 14px;
      overflow: auto;
      background: #fff;
    }

    .section-title {
      font-weight: bold;
      margin: 6px 0 8px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      margin-bottom: 10px;
    }

    .search-row input,
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px;
      background: #fff;
    }

    .tree-box {
      border: 1px solid var(--border);
      min-height: 360px;
      padding: 6px;
      background: #fff;
    }

    .root-drop {
      border: 1px dashed #bbb;
      border-radius: 4px;
      padding: 5px 7px;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      background: #fafafa;
    }

    .root-drop.drag-over {
      border-color: var(--blue);
      background: var(--selected);
      color: var(--blue);
    }

    .tree-item {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 32px;
      padding: 3px 6px;
      border-radius: 4px;
      white-space: nowrap;
      border-left: 4px solid transparent;
    }

    .tree-item:hover { background: #f5f5f5; }

    .tree-item.selected {
      background: var(--selected);
      color: #0b3d91;
      font-weight: bold;
    }

    .tree-item.drag-over {
      outline: 1px dashed var(--blue);
      background: var(--selected);
    }

    .tree-item.review-modificado {
      border-left-color: var(--blue);
      background: var(--blue-bg);
    }

    .tree-item.review-novo {
      border-left-color: var(--green);
      background: var(--green-bg);
    }

    .tree-item.review-excluir {
      border-left-color: var(--red);
      background: var(--red-bg);
      color: var(--red);
    }

    .tree-item.review-excluir .term-label,
    .tree-item.review-excluir .toggle {
      color: var(--red);
      font-weight: bold;
    }

    .tree-item.review-modificado .term-label,
    .tree-item.review-modificado .toggle {
      color: var(--blue);
      font-weight: bold;
    }  

    .tree-item.review-novo .term-label,
    .tree-item.review-novo .toggle {
      color: var(--green);
      font-weight: bold;
    }

    .tree-item.review-excluir .term-label,
    .tree-item.review-excluir .toggle {
      color: var(--red);
      font-weight: bold;
    }

    .toggle {
      width: 28px;
      border: 0;
      background: transparent;
      padding: 0;
      color: #333;
      font-size: 17px;
      font-weight: bold;
      line-height: 1;
    }

    .term-label {
      flex: 1;
      text-align: left;
      border: 0;
      background: transparent;
      padding: 5px 4px;
      font-size: 16px;
    }

    .review-badge {
      font-size: 12px;
      padding: 1px 5px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: #fff;
    }

    .review-badge.modificado { color: var(--blue); border-color: var(--blue); }
    .review-badge.novo { color: var(--green); border-color: var(--green); }
    .review-badge.excluir { color: var(--red); border-color: var(--red); }

    .add-box {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 980px;
    }

    .field { margin-bottom: 9px; }
    .field.full { grid-column: 1 / -1; }

    .field label {
      display: block;
      color: #333;
      font-size: 12px;
      margin-bottom: 3px;
    }

    textarea {
      resize: vertical;
      min-height: 72px;
    }

    .term-header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 10px;
    }

    .term-header h1 {
      font-size: 20px;
      margin: 0 0 3px;
      font-weight: normal;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .legend-mark {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .legend-mark.blue { background: var(--blue); }
    .legend-mark.green { background: var(--green); }
    .legend-mark.red { background: var(--red); }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin: 8px 0 12px;
    }

    .tab {
      padding: 8px 12px;
      border: 1px solid transparent;
      border-bottom: 0;
      background: transparent;
      border-radius: 4px 4px 0 0;
    }

    .tab.active {
      border-color: var(--border);
      background: white;
      font-weight: bold;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .toolbar {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .relation-box,
    .comment-box {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      background: #fff;
    }

    .comment-box.resolved {
      background: var(--soft);
      color: #555;
    }

    .comment-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 5px;
    }

    .status-pill {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      background: #eee;
      font-size: 12px;
    }

    .status-pill.open { background: #fff3cd; }
    .status-pill.resolved { background: #e2f4e8; }

    .empty {
      color: var(--muted);
      padding: 10px;
    }

    .small-list {
      line-height: 1.7;
      margin: 0;
      padding-left: 18px;
    }

    .pending-list {
      display: grid;
      gap: 8px;
    }

    .pending-card {
      border: 1px solid var(--border);
      border-left: 5px solid transparent;
      border-radius: 6px;
      padding: 10px;
      background: #fff;
    }

    .pending-card.review-modificado {
      border-left-color: var(--blue);
      background: var(--blue-bg);
    }

    .pending-card.review-novo {
      border-left-color: var(--green);
      background: var(--green-bg);
    }

    .pending-card.review-excluir {
      border-left-color: var(--red);
      background: var(--red-bg);
    }

    .pending-title {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 5px;
    }

    .pending-summary {
      margin: 6px 0;
      padding-left: 18px;
      line-height: 1.5;
    }

    .export-box {
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    #statusMessage {
      margin-top: 8px;
      line-height: 1.35;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        height: auto;
      }

      .splitter {
        display: none;
      }
      .left {
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

    function setLeftWidth(px) {
      const min = 280;
      const max = Math.max(360, window.innerWidth - 360);
      const width = Math.min(Math.max(px, min), max);

      document.documentElement.style.setProperty("--left-width", `${width}px`);
      localStorage.setItem(LAYOUT_KEY, String(width));
    }

    function initResizableLayout() {
      const savedWidth = Number(localStorage.getItem(LAYOUT_KEY));

      if (savedWidth) {
        setLeftWidth(savedWidth);
      }

      let resizing = false;

      splitter.addEventListener("pointerdown", event => {
        resizing = true;
        splitter.classList.add("resizing");
        document.body.classList.add("resizing");
        splitter.setPointerCapture(event.pointerId);
      });

      splitter.addEventListener("pointermove", event => {
        if (!resizing) return;
        setLeftWidth(event.clientX);
      });

      function stopResize() {
        resizing = false;
        splitter.classList.remove("resizing");
        document.body.classList.remove("resizing");
      }

      splitter.addEventListener("pointerup", stopResize);
      splitter.addEventListener("pointercancel", stopResize);
    }
