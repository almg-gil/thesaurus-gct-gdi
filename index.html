      }

      if (!data || data.ativo !== true) {
        throw new Error("Usuário sem perfil ativo.");
      }

      return data;
    }

    async function iniciarComUsuarioAutenticado(authUser) {
      const profile = await carregarPerfilUsuario(authUser);

      setLoggedInProfile(profile);
      mostrarApp();

      if (!appStarted) {
        appStarted = true;
        initResizableLayout();
        await iniciarApp();
      }
    }

    async function fazerLogin() {
      const matricula = loginUsuario.value.trim().toLowerCase();
      const senha = loginSenha.value;

      if (!matricula || !senha) {
        loginError.textContent = "Informe matrícula e senha.";
        return;
      }

      loginError.textContent = "Entrando...";

      const { data, error } = await db.auth.signInWithPassword({
        email: matriculaParaEmail(matricula),
        password: senha
      });

      if (error) {
        console.error(error);
        loginError.textContent = "Matrícula ou senha inválida.";
        loginSenha.value = "";
        loginSenha.focus();
        return;
      }

      try {
        await iniciarComUsuarioAutenticado(data.user);
        loginError.textContent = "";
      } catch (profileError) {
        console.error(profileError);
        await db.auth.signOut();
        loginError.textContent = profileError.message;
        mostrarTelaLogin();
      }
    }

    async function fazerLogout() {
      await db.auth.signOut();

      currentProfileData = null;
      currentUser.value = "";
      currentProfile.value = "";
      currentUserDisplay.textContent = "";

      mostrarTelaLogin();
    }

    async function initAuth() {
      loginForm.addEventListener("submit", event => {
        event.preventDefault();
        fazerLogin();
      });

      logoutBtn.addEventListener("click", fazerLogout);

      const { data, error } = await db.auth.getSession();

      if (error) {
        console.error(error);
        mostrarTelaLogin();
        return;
      }

      if (data.session?.user) {
        try {
          await iniciarComUsuarioAutenticado(data.session.user);
        } catch (profileError) {
          console.error(profileError);
          await db.auth.signOut();
          mostrarTelaLogin();
        }
      } else {
        mostrarTelaLogin();
      }
    }

    async function loadState() {
      const { data, error } = await db
        .from("app_state")
        .select("payload")
        .eq("id", "tesauro")
        .single();

      if (error) {
        console.error(error);
        alert(`Não foi possível carregar os dados do Supabase.

Detalhe: ${error.message || JSON.stringify(error)}

O app usará os dados de exemplo.`);
        return structuredClone(exemplo);
      }

      return normalizeState(data?.payload);
    }

    function normalizeReview(term) {
      const valid = [REVIEW_ORIGINAL, REVIEW_MODIFICADO, REVIEW_NOVO, REVIEW_EXCLUIR];
      if (valid.includes(term.revisao)) return term.revisao;
      if (term.status === "candidato") return REVIEW_NOVO;
      return REVIEW_ORIGINAL;
    }

    function normalizeState(payload) {
      let parsed = payload;

      if (typeof parsed === "string") {
        try {
          parsed = JSON.parse(parsed);
        } catch {
          parsed = null;
        }
      }

      if (!parsed || typeof parsed !== "object" || !Array.isArray(parsed.terms)) {
        return structuredClone(exemplo);
      }

      parsed.comments = Array.isArray(parsed.comments) ? parsed.comments : [];
      parsed.expanded = Array.isArray(parsed.expanded) ? parsed.expanded.map(String) : [];
      parsed.icmgSourceVersion = parsed.icmgSourceVersion || "";
      parsed.icmgSourceImportedAt = parsed.icmgSourceImportedAt || "";

      parsed.terms = parsed.terms.map(term => ({
        id: String(term.id || uid("term")),
        parentId: term.parentId ? String(term.parentId) : null,
        termo: term.termo || "Sem termo",
        termoAnterior: term.termoAnterior || "",
        conceito: term.conceito || "",
        definicao: term.definicao || "",
        notaEscopo: term.notaEscopo || "",
        notaUso: term.notaUso || "",
        relacionados: Array.isArray(term.relacionados) ? term.relacionados.map(String) : [],
        relacionadosNaoAutorizados: Array.isArray(term.relacionadosNaoAutorizados)
            ? term.relacionadosNaoAutorizados.map(String)
            : [],
        revisao: normalizeReview(term),
        original: term.original && typeof term.original === "object" ? {
          parentId: term.original.parentId ? String(term.original.parentId) : null,
          termo: term.original.termo || "",
          termoAnterior: term.original.termoAnterior || "",
          conceito: term.original.conceito || "",
          definicao: term.original.definicao || "",
          notaEscopo: term.original.notaEscopo || "",
          notaUso: term.original.notaUso || "",
          relacionados: Array.isArray(term.original.relacionados) ? term.original.relacionados.map(String) : [],
          relacionadosNaoAutorizados: Array.isArray(term.original.relacionadosNaoAutorizados)
            ? term.original.relacionadosNaoAutorizados.map(String)
            : []
        } : null,
        revisaoPor: term.revisaoPor || "",
        revisaoEm: term.revisaoEm || ""
      }));

      if (!parsed.selectedId || !parsed.terms.some(t => t.id === parsed.selectedId)) {
        parsed.selectedId = parsed.terms[0]?.id || null;
      } else {
        parsed.selectedId = String(parsed.selectedId);
      }

      return parsed;
    }

    async function saveState() {
      state = normalizeState(state);

      const { error } = await db
        .from("app_state")
        .upsert({
          id: "tesauro",
          payload: state,
          updated_at: new Date().toISOString()
        });

      if (error) {
        console.error(error);
        alert(`Não foi possível salvar os dados no Supabase.

Detalhe: ${error.message || JSON.stringify(error)}`);
      }
    }

    function uid(prefix = "id") {
      return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function nowLabel() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function parentKey(parentId) {
      return parentId ? String(parentId) : "__ROOT__";
    }

    function buildIndexes() {
      termById = new Map();
      childrenByParent = new Map();
      termPathCache = new Map();

      for (const term of state.terms) {
        termById.set(String(term.id), term);

        const key = parentKey(term.parentId);

        if (!childrenByParent.has(key)) {
          childrenByParent.set(key, []);
        }

        childrenByParent.get(key).push(term);
      }

      for (const children of childrenByParent.values()) {
        children.sort((a, b) => a.termo.localeCompare(b.termo, "pt-BR"));
      }
    }

    function getTerm(id) {
      if (!id) return null;
      return termById.get(String(id)) || null;
    }

    function childrenOf(parentId) {
      return childrenByParent.get(parentKey(parentId)) || [];
    }

    function rootTermIds() {
      return state.terms
        .filter(term => !term.parentId)
        .map(term => term.id);
    }

    function expandOnlyClasses() {
      state.expanded = rootTermIds();
    }

    function collapseTreeToClasses() {
      searchInput.value = "";
      expandOnlyClasses();
      render();
    }

    function termPath(term) {
      if (!term) return "";

      const cacheKey = String(term.id);

      if (termPathCache.has(cacheKey)) {
        return termPathCache.get(cacheKey);
      }

      const parts = [];
      let current = term;
      const guard = new Set();

      while (current && !guard.has(current.id)) {
        guard.add(current.id);
        parts.push(displayTermName(current));
        current = getTerm(current.parentId);
      }

      const path = parts.reverse().join(" / ");
      termPathCache.set(cacheKey, path);

      return path;
    }

    function snapshotTerm(term) {
      return {
        parentId: term.parentId || null,
        termo: term.termo || "",
        termoAnterior: term.termoAnterior || "",
        conceito: term.conceito || "",
        definicao: term.definicao || "",
        notaEscopo: term.notaEscopo || "",
        notaUso: term.notaUso || "",
        relacionados: Array.isArray(term.relacionados) ? [...term.relacionados] : [],
        relacionadosNaoAutorizados: Array.isArray(term.relacionadosNaoAutorizados)
          ? [...term.relacionadosNaoAutorizados]
          : []
      };
    }

    function registerReviewMetadata(term) {
      term.revisaoPor = currentUser.value.trim() || "Usuário";
      term.revisaoEm = nowLabel();
    }

    function ensureOriginal(term) {
      if (!term || term.revisao === REVIEW_NOVO) return;
      if (!term.original) {
        term.original = snapshotTerm(term);
      }
    }

    function restoreTermFromOriginal(term) {
      if (!term || !term.original) return false;

      term.parentId = term.original.parentId || null;
      term.termo = term.original.termo || term.termo;
      term.termoAnterior = term.original.termoAnterior || "";
      term.conceito = term.original.conceito || "";
      term.definicao = term.original.definicao || "";
      term.notaEscopo = term.original.notaEscopo || "";
      term.notaUso = term.original.notaUso || "";
      term.relacionados = Array.isArray(term.original.relacionados) ? [...term.original.relacionados] : [];
      term.relacionadosNaoAutorizados = Array.isArray(term.original.relacionadosNaoAutorizados)
        ? [...term.original.relacionadosNaoAutorizados]
        : [];

      return true;
    }

    function clearReview(term) {
      if (!term) return;
      term.revisao = REVIEW_ORIGINAL;
      term.original = null;
      term.revisaoPor = "";
      term.revisaoEm = "";
    }

    function markModified(term) {
      if (!term) return;
      if (term.revisao === REVIEW_NOVO || term.revisao === REVIEW_EXCLUIR) return;
      ensureOriginal(term);
      term.revisao = REVIEW_MODIFICADO;
      registerReviewMetadata(term);
    }

    function getPendingTerms() {
      const order = {
        [REVIEW_EXCLUIR]: 1,
        [REVIEW_NOVO]: 2,
        [REVIEW_MODIFICADO]: 3
      };

      return state.terms
        .filter(t => t.revisao && t.revisao !== REVIEW_ORIGINAL)
        .slice()
        .sort((a, b) => {
          const orderA = order[a.revisao] || 99;
          const orderB = order[b.revisao] || 99;
          if (orderA !== orderB) return orderA - orderB;
          return termPath(a).localeCompare(termPath(b), "pt-BR");
        });
    }

    function reviewLabel(revisao) {
      if (revisao === REVIEW_MODIFICADO) return "alterado";
      if (revisao === REVIEW_NOVO) return "novo";
      if (revisao === REVIEW_EXCLUIR) return "exclusão sugerida";
      return "original";
    }

    function pendingTerms() {
      return state.terms.filter(t => t.revisao && t.revisao !== REVIEW_ORIGINAL);
    }

    function isTermPending(term) {
      return Boolean(term && term.revisao && term.revisao !== REVIEW_ORIGINAL);
    }

    function updateReviewTopButton() {
      const count = pendingTerms().length;
      reviewTopBtn.textContent = `Ver pendências (${count})`;
      reviewTopBtn.classList.toggle("has-pending", count > 0);
    }

    function renderPendingArea() {
      const pendencias = pendingTerms()
        .slice()
        .sort((a, b) => reviewLabel(a.revisao).localeCompare(reviewLabel(b.revisao), "pt-BR") || a.termo.localeCompare(b.termo, "pt-BR"));

      termArea.innerHTML = `
        <div class="term-header">
          <h1>Pendências de revisão</h1>
          <div class="muted">${pendencias.length} pendência(s) aguardando deliberação da biblioteca.</div>
        </div>

        <div class="toolbar">
          <button id="backToTermBtn">Voltar ao termo selecionado</button>
        </div>

        <hr>

        ${
          pendencias.length
            ? pendencias.map(renderPendingItemHtml).join("")
            : '<div class="empty">Não há pendências de revisão.</div>'
        }
      `;

      const backToTermBtn = document.getElementById("backToTermBtn");
      if (backToTermBtn) {
        backToTermBtn.onclick = () => {
          reviewMode = false;
          render();
            };
  }

      document.querySelectorAll("[data-pending-action]").forEach(btn => {
        btn.onclick = async () => {
          const termId = btn.dataset.termId;
          const action = btn.dataset.pendingAction;

          if (action === "view") {
            state.selectedId = termId;
            reviewMode = false;
            render();
            return;
          }

          if (action === "approve") {
            await approvePending(termId);
            return;
          }

          if (action === "reject") {
            await rejectPending(termId);
            return;
          }
        };
      });
    }

function renderPendingItemHtml(term) {
  const tipo = reviewLabel(term.revisao);
  const caminho = termPath(term);

  return `
    <div class="relation-box">
      <div class="comment-head">
        <div>
          <strong>${escapeHtml(displayTermName(term))}</strong>
          <div class="muted">${escapeHtml(caminho)}</div>
        </div>
        <span class="review-badge ${escapeAttr(term.revisao)}">${escapeHtml(tipo)}</span>
      </div>

      ${renderOriginalSummary(term)}

      <div class="toolbar">
        <button data-pending-action="view" data-term-id="${escapeAttr(term.id)}">Ver termo</button>
        <button class="success" data-pending-action="approve" data-term-id="${escapeAttr(term.id)}">Aprovar</button>
        <button class="danger" data-pending-action="reject" data-term-id="${escapeAttr(term.id)}">Rejeitar</button>
      </div>
    </div>
  `;
}

function renderOriginalSummary(term) {
  if (!term.original) {
    return "";
  }

  const originalParent = getTerm(term.original.parentId);
  const currentParent = getTerm(term.parentId);

  const linhas = [];

  if (term.original.termo !== term.termo) {
    linhas.push(`Nome anterior: ${term.original.termo}`);
  }

  if ((term.original.parentId || null) !== (term.parentId || null)) {
    linhas.push(`Termo geral anterior: ${originalParent ? originalParent.termo : "Sem termo geral"}`);
    linhas.push(`Termo geral atual: ${currentParent ? currentParent.termo : "Sem termo geral"}`);
  }

  if ((term.original.definicao || "") !== (term.definicao || "")) {
    linhas.push("Definição alterada");
  }

  if ((term.original.notaEscopo || "") !== (term.notaEscopo || "")) {
    linhas.push("Nota Explicativa alterada");
  }

  if ((term.original.notaUso || "") !== (term.notaUso || "")) {
    linhas.push("Nota Histórica alterada");
  }

  if (!linhas.length) {
    return "";
  }

  return `
    <ul class="small-list">
      ${linhas.map(linha => `<li>${escapeHtml(linha)}</li>`).join("")}
    </ul>
  `;
}

    function displayTermName(term) {
      if (term.termoAnterior && term.termoAnterior !== term.termo) {
        return `${term.termo} (${term.termoAnterior})`;
      }

      return term.termo;
    }

    function hasMatchingDescendant(term, query) {
      if (!query) return true;
      if (matchesTerm(term, query)) return true;
      return childrenOf(term.id).some(child => hasMatchingDescendant(child, query));
    }

    function matchesTerm(term, query) {
      const text = [term.termo, term.conceito, term.definicao, term.notaEscopo, term.notaUso]
        .join(" ")
        .toLowerCase();
      return text.includes(query.toLowerCase());
    }

    function canMoveTerm(dragId, newParentId) {
      if (!dragId) return false;
      if (dragId === newParentId) return false;

      let current = getTerm(newParentId);
      const guard = new Set();

      while (current && !guard.has(current.id)) {
        guard.add(current.id);
        if (current.id === dragId) return false;
        current = getTerm(current.parentId);
      }

      return true;
    }

    async function moveTerm(dragId, newParentId) {
      const term = getTerm(dragId);
      if (!term) return;

      const finalParentId = newParentId || null;

      if (!canMoveTerm(dragId, finalParentId)) {
        alert("Movimento inválido: não é possível mover um termo para dentro dele mesmo ou de um descendente.");
        return;
      }

      if (term.parentId === finalParentId) return;

      ensureOriginal(term);
      term.parentId = finalParentId;
      markModified(term);

      if (finalParentId && !state.expanded.includes(finalParentId)) {
        state.expanded.push(finalParentId);
      }

      state.selectedId = term.id;
      await saveState();
      render();
    }

    function renderTree() {
      const query = searchInput.value.trim();
      treeEl.innerHTML = "";

      const rootDrop = document.createElement("div");
      rootDrop.className = "root-drop";
      rootDrop.textContent = "Solte aqui para mover para a raiz";
      rootDrop.addEventListener("dragover", e => {
        e.preventDefault();
        rootDrop.classList.add("drag-over");
      });
      rootDrop.addEventListener("dragleave", () => rootDrop.classList.remove("drag-over"));
      rootDrop.addEventListener("drop", async e => {
        e.preventDefault();
        rootDrop.classList.remove("drag-over");
        if (draggedTermId) await moveTerm(draggedTermId, null);
        draggedTermId = null;
      });
      treeEl.appendChild(rootDrop);

      const roots = childrenOf(null);

      if (!roots.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Nenhum termo cadastrado.";
        treeEl.appendChild(empty);
        return;
      }

      roots.forEach(root => renderTreeNode(root, 0, query));
    }

    function renderTreeNode(term, level, query) {
      if (query && !hasMatchingDescendant(term, query)) return;

      const children = childrenOf(term.id);
      const expanded = state.expanded.includes(term.id) || Boolean(query);
      const item = document.createElement("div");
      item.className = `tree-item review-${term.revisao || REVIEW_ORIGINAL}` + (term.id === state.selectedId ? " selected" : "");
      item.style.paddingLeft = `${level * 18 + 4}px`;
      item.draggable = true;
      item.title = "Arraste para mover este termo para outra hierarquia";

      item.addEventListener("dragstart", e => {
        draggedTermId = term.id;
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", term.id);
      });

      item.addEventListener("dragover", e => {
        e.preventDefault();
        item.classList.add("drag-over");
      });

      item.addEventListener("dragleave", () => item.classList.remove("drag-over"));

      item.addEventListener("drop", async e => {
        e.preventDefault();
        e.stopPropagation();
        item.classList.remove("drag-over");
        const draggedId = e.dataTransfer.getData("text/plain") || draggedTermId;
        await moveTerm(draggedId, term.id);
        draggedTermId = null;
      });

      item.addEventListener("dragend", () => {
        draggedTermId = null;
        document.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));
      });

      const toggle = document.createElement("button");
      toggle.className = "toggle";
      toggle.textContent = children.length ? (expanded ? "▾" : "▸") : "•";
      toggle.title = expanded ? "Recolher" : "Expandir";
      toggle.onclick = (e) => {
        e.stopPropagation();
        if (!children.length) return;

        if (state.expanded.includes(term.id)) {
          state.expanded = state.expanded.filter(id => id !== term.id);
        } else {
          state.expanded.push(term.id);
      }

      render();
      };

      const label = document.createElement("button");
      label.className = "term-label";
      label.textContent = displayTermName(term);;
      label.onclick = () => {
        state.selectedId = term.id;
        reviewMode = false;
        render();
      };

      item.appendChild(toggle);
      item.appendChild(label);

      if (term.revisao && term.revisao !== REVIEW_ORIGINAL) {
        const badge = document.createElement("span");
        badge.className = `review-badge ${term.revisao}`;
        badge.textContent = reviewLabel(term.revisao);
        item.appendChild(badge);
      }

      treeEl.appendChild(item);

      if (expanded) {
        children.forEach(child => renderTreeNode(child, level + 1, query));
      }
    }

    function renderParentOptions() {
      newParent.innerHTML = '<option value="">Sem termo geral</option>';

      state.terms
        .filter(t => t.revisao !== REVIEW_EXCLUIR)
        .slice()
        .sort((a, b) => termPath(a).localeCompare(termPath(b), "pt-BR"))
        .forEach(term => {
          const option = document.createElement("option");
          option.value = term.id;
          option.textContent = termPath(term);
          option.selected = term.id === state.selectedId;
          newParent.appendChild(option);
        });
    }

    function renderTermArea() {
      const term = getTerm(state.selectedId);

      if (!term) {
        termArea.innerHTML = '<div class="empty">Selecione ou crie um termo.</div>';
        return;
      }

      const parent = getTerm(term.parentId);
      const children = childrenOf(term.id);
      const relatedTerms = (term.relacionados || []).map(getTerm).filter(Boolean);
      const comments = state.comments.filter(c => c.termId === term.id)
        .sort((a, b) => Number(a.resolved) - Number(b.resolved) || String(b.createdAt).localeCompare(String(a.createdAt)));

      const naoAutorizados = Array.isArray(term.relacionadosNaoAutorizados)
        ? term.relacionadosNaoAutorizados
        : [];

      const deleteButtonLabel = term.revisao === REVIEW_EXCLUIR ? "Cancelar sugestão de exclusão" : "Sugerir exclusão";
      const deleteButtonClass = term.revisao === REVIEW_EXCLUIR ? "success" : "danger";
      const pendingCount = isTermPending(term) ? 1 : 0;

      termArea.innerHTML = `
        <div class="term-header">
          <h1>${escapeHtml(displayTermName(term))}</h1>
          <div class="muted">${escapeHtml(termPath(term))}</div>
          <div class="muted">Situação: <strong>${escapeHtml(reviewLabel(term.revisao))}</strong></div>
        </div>

        <div class="tabs">
          <button class="tab active" data-tab="cadastro">Cadastro</button>
          <button class="tab" data-tab="relacoes">Relacionamentos</button>
          <button class="tab" data-tab="comentarios">Comentários (${comments.filter(c => !c.resolved).length} abertos)</button>
          <button class="tab" data-tab="pendencias">Pendências (${pendingCount})</button>
        </div>

        <div id="cadastro" class="panel active">
          <div class="form-grid">
            <div class="field full">
              <label>Termo</label>
              <input id="editTermo" value="${escapeAttr(term.termo)}" />
            </div>
            <div class="field full">
              <label>Definição</label>
              <textarea id="editDefinicao">${escapeHtml(term.definicao || "")}</textarea>
            </div>
            <div class="field full">
              <label>Nota Explicativa</label>
              <textarea id="editNotaEscopo">${escapeHtml(term.notaEscopo || "")}</textarea>
            </div>
            <div class="field full">
             <label>Nota Histórica</label>
              <textarea id="editNotaUso">${escapeHtml(term.notaUso || "")}</textarea>
            </div>
            <div class="field full">
              <label>Termo geral</label>
              <select id="editParent">
                ${parentOptions(term.id, term.parentId)}
              </select>
            </div>
          </div>
          <div class="toolbar">
            <button id="saveTermBtn" class="primary">Salvar alterações</button>
            <button id="suggestDeleteBtn" class="${deleteButtonClass}">${deleteButtonLabel}</button>
            <button id="clearReviewBtn">Limpar marcação</button>
          </div>
        </div>

        <div id="relacoes" class="panel">
          <div class="relation-box">
            <strong>Termo geral</strong><br>
            ${parent ? escapeHtml(parent.termo) : '<span class="muted">—</span>'}
          </div>

          <div class="relation-box">
            <strong>Termos específicos</strong>
            ${children.length ? `<ul class="small-list">${children.map(c => `<li>${escapeHtml(c.termo)} ${c.revisao !== REVIEW_ORIGINAL ? `<span class="review-badge ${c.revisao}">${reviewLabel(c.revisao)}</span>` : ""}</li>`).join("")}</ul>` : '<div class="muted">—</div>'}
          </div>

          <div class="relation-box">
            <strong>Sinônimos autorizados / TR</strong>
            ${relatedTerms.length ? `<ul class="small-list">${relatedTerms.map(r => `<li>${escapeHtml(r.termo)}</li>`).join("")}</ul>` : '<div class="muted">—</div>'}
            <div class="toolbar">
              <select id="addRelatedSelect">${relatedOptions(term.id)}</select>
              <button id="addRelatedBtn">Adicionar relação</button>
            </div>
          </div>

          <div class="relation-box">
            <strong>Sinônimos não autorizados / UP</strong>
            ${naoAutorizados.length ? `<ul class="small-list">${naoAutorizados.map(r => `<li>${escapeHtml(r)}</li>`).join("")}</ul>` : '<div class="muted">—</div>'}
            </div>

            <div id="comentarios" class="panel">
              <div class="field">
                <label>Novo comentário</label>
                <textarea id="newCommentText" placeholder="Escreva uma observação sobre este termo..."></textarea>
              </div>
              <button id="addCommentBtn" class="primary">Adicionar comentário</button>
              <hr>
              <div id="commentsList">
                ${comments.length ? comments.map(renderCommentHtml).join("") : '<div class="empty">Nenhum comentário para este termo.</div>'}
              </div>
            </div>

            <div id="pendencias" class="panel">
              ${renderPendingPanel(term)}
              </div>
          `;

      wireTermArea(term);
    }

    function getTermNameForSummary(id) {
      if (!id) return "Sem termo geral";
      const term = getTerm(id);
      return term ? displayTermName(term) : "Termo não encontrado";
    }

    function renderPendingSummary(term) {
      if (term.revisao === REVIEW_NOVO) {
        return `<ul class="pending-summary"><li>Novo termo em: ${escapeHtml(getTermNameForSummary(term.parentId))}</li></ul>`;
      }

      if (term.revisao === REVIEW_EXCLUIR) {
        return `<ul class="pending-summary"><li>Exclusão sugerida para este termo.</li></ul>`;
      }

      const original = term.original;
      if (!original) {
        return `<ul class="pending-summary"><li>Alteração registrada sem cópia anterior disponível.</li></ul>`;
      }

      const changes = [];

      if ((original.termo || "") !== (term.termo || "")) {
        changes.push(`Nome: ${escapeHtml(original.termo || "")} → ${escapeHtml(term.termo || "")}`);
      }

      if ((original.parentId || null) !== (term.parentId || null)) {
        changes.push(`Termo geral: ${escapeHtml(getTermNameForSummary(original.parentId))} → ${escapeHtml(getTermNameForSummary(term.parentId))}`);
      }


      if ((original.definicao || "") !== (term.definicao || "")) {
        changes.push("Definição alterada");
      }

      if ((original.notaEscopo || "") !== (term.notaEscopo || "")) {
        changes.push("Nota Explicativa alterada");
      }

      if ((original.notaUso || "") !== (term.notaUso || "")) {
        changes.push("Nota Histórica alterada");
      }

      if (JSON.stringify(original.relacionados || []) !== JSON.stringify(term.relacionados || [])) {
        changes.push("Termos relacionados alterados");
      }

      if (
        JSON.stringify(original.relacionadosNaoAutorizados || []) !==
        JSON.stringify(term.relacionadosNaoAutorizados || [])
      ) {
        changes.push("Sinônimos não autorizados alterados");
      }

      if (!changes.length) {
        changes.push("Alteração registrada.");
      }

      return `<ul class="pending-summary">${changes.map(change => `<li>${change}</li>`).join("")}</ul>`;
    }

    function renderPendingPanel(termFilter = null) {
      const pending = termFilter
        ? (isTermPending(termFilter) ? [termFilter] : [])
        : getPendingTerms();

      if (!pending.length) {
        return '<div class="empty">Não há pendências para este termo.</div>';
      }

      return `
        <div class="pending-list">
          ${pending.map(term => `
            <div class="pending-card review-${term.revisao}">
              <div class="pending-title">
                <span class="review-badge ${term.revisao}">${escapeHtml(reviewLabel(term.revisao))}</span>
                <strong>${escapeHtml(displayTermName(term))}</strong>
              </div>
              <div class="muted">${escapeHtml(termPath(term))}</div>
              ${term.revisaoPor || term.revisaoEm ? `<div class="muted">Registrado por ${escapeHtml(term.revisaoPor || "Usuário")} ${term.revisaoEm ? `em ${escapeHtml(term.revisaoEm)}` : ""}</div>` : ""}
              ${renderPendingSummary(term)}
              <div class="toolbar">
                <button data-pending-action="view" data-term-id="${term.id}">Ver termo</button>
                <button class="success" data-pending-action="approve" data-term-id="${term.id}">Aprovar</button>
                <button class="danger" data-pending-action="reject" data-term-id="${term.id}">Rejeitar</button>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function parentOptions(currentId, selectedParentId) {
      const options = ['<option value="">Sem termo geral</option>'];

      state.terms
        .filter(t => t.id !== currentId && t.revisao !== REVIEW_EXCLUIR && !isDescendantOf(t.id, currentId))
        .slice()
        .sort((a, b) => termPath(a).localeCompare(termPath(b), "pt-BR"))
        .forEach(t => {
          options.push(`<option value="${t.id}" ${t.id === selectedParentId ? "selected" : ""}>${escapeHtml(termPath(t))}</option>`);
        });

      return options.join("");
    }

    function relatedOptions(currentId) {
      const current = getTerm(currentId);
      const selected = new Set(current?.relacionados || []);
      const options = ['<option value="">Selecione um termo</option>'];

      state.terms
        .filter(t => t.id !== currentId && t.revisao !== REVIEW_EXCLUIR && !selected.has(t.id))
        .slice()
        .sort((a, b) => termPath(a).localeCompare(termPath(b), "pt-BR"))
        .forEach(t => options.push(`<option value="${t.id}">${escapeHtml(termPath(t))}</option>`));

      return options.join("");
    }

    function isDescendantOf(candidateId, possibleAncestorId) {
      let current = getTerm(candidateId);
      const guard = new Set();

      while (current && current.parentId && !guard.has(current.id)) {
        guard.add(current.id);
        if (current.parentId === possibleAncestorId) return true;
        current = getTerm(current.parentId);
      }

      return false;
    }

    function renderCommentHtml(c) {
      const statusClass = c.resolved ? "resolved" : "open";
      const statusLabel = c.resolved ? "resolvido" : "aberto";
      const footer = c.resolved ? `<div class="muted">Resolvido por ${escapeHtml(c.resolvedBy || "")} em ${escapeHtml(c.resolvedAt || "")}</div>` : "";

      return `
        <div class="comment-box ${c.resolved ? "resolved" : ""}">
          <div class="comment-head">
            <div><strong>${escapeHtml(c.author)}</strong> <span class="muted">· ${escapeHtml(c.createdAt)}</span></div>
            <span class="status-pill ${statusClass}">${statusLabel}</span>
          </div>
          <div>${escapeHtml(c.text || "").split("\\n").join("<br>")}</div>
          ${footer}
          <div class="toolbar">
            ${c.resolved
              ? `<button data-comment-action="reopen" data-comment-id="${c.id}">Reabrir</button>`
              : `<button class="success" data-comment-action="resolve" data-comment-id="${c.id}">Resolver</button>`}
          </div>
        </div>
      `;
    }

    function wireTermArea(term) {
      document.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
          document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
          tab.classList.add("active");
          document.getElementById(tab.dataset.tab).classList.add("active");
        });
      });

      const saveBtn = document.getElementById("saveTermBtn");
      if (saveBtn) {
        saveBtn.onclick = async () => {
          const oldParentId = term.parentId;
          const before = snapshotTerm(term);

          const novoTermo = document.getElementById("editTermo").value.trim() || term.termo;

          if (novoTermo !== term.termo) {
            if (!term.termoAnterior && term.revisao !== REVIEW_NOVO) {
              term.termoAnterior = term.termo;
            }

            term.termo = novoTermo;
          }

          term.definicao = document.getElementById("editDefinicao").value.trim();
          term.notaEscopo = document.getElementById("editNotaEscopo").value.trim();
          term.notaUso = document.getElementById("editNotaUso").value.trim();
          term.parentId = document.getElementById("editParent").value || null;

          const changed = JSON.stringify(before) !== JSON.stringify(snapshotTerm(term));

          if (changed) {
            if (term.revisao !== REVIEW_NOVO && term.revisao !== REVIEW_EXCLUIR && !term.original) {
              term.original = before;
            }
            markModified(term);
          }

          if (
            term.parentId &&
            term.parentId !== oldParentId &&
            !state.expanded.includes(term.parentId)
          ) {
            state.expanded.push(term.parentId);
          }

          await saveState();
          render();
        };
      }
      const suggestDeleteBtn = document.getElementById("suggestDeleteBtn");
      if (suggestDeleteBtn) {
        suggestDeleteBtn.onclick = async () => {
          if (term.revisao === REVIEW_EXCLUIR) {
            clearReview(term);
          } else {
            ensureOriginal(term);
            term.revisao = REVIEW_EXCLUIR;
            registerReviewMetadata(term);
          }
          await saveState();
          render();
        };
      }

      const clearReviewBtn = document.getElementById("clearReviewBtn");
      if (clearReviewBtn) {
        clearReviewBtn.onclick = async () => {
          clearReview(term);
          await saveState();
          render();
        };
      }

      const addRelatedBtn = document.getElementById("addRelatedBtn");
      if (addRelatedBtn) {
        addRelatedBtn.onclick = async () => {
          const relatedId = document.getElementById("addRelatedSelect").value;
          if (!relatedId) return;

          ensureOriginal(term);
          term.relacionados = term.relacionados || [];
          if (!term.relacionados.includes(relatedId)) term.relacionados.push(relatedId);

          const other = getTerm(relatedId);
          if (other) {
            other.relacionados = other.relacionados || [];
            if (!other.relacionados.includes(term.id)) other.relacionados.push(term.id);
          }

          markModified(term);
          await saveState();
          render();
        };
      }

      const addCommentBtn = document.getElementById("addCommentBtn");
      if (addCommentBtn) {
        addCommentBtn.onclick = async () => {
          const text = document.getElementById("newCommentText").value.trim();
          if (!text) return;

          state.comments.push({
            id: uid("comment"),
            termId: term.id,
            author: currentUser.value.trim() || "Usuário",
            text,
            createdAt: nowLabel(),
            resolved: false,
            resolvedBy: null,
            resolvedAt: null
          });

          await saveState();
          render();
          setActiveTab("comentarios");
        };
      }

      document.querySelectorAll("[data-comment-action]").forEach(btn => {
        btn.onclick = async () => {
          const comment = state.comments.find(c => c.id === btn.dataset.commentId);
          if (!comment) return;

          if (btn.dataset.commentAction === "resolve") {
            comment.resolved = true;
            comment.resolvedBy = currentUser.value.trim() || "Usuário";
            comment.resolvedAt = nowLabel();
          } else {
            comment.resolved = false;
            comment.resolvedBy = null;
            comment.resolvedAt = null;
          }

          await saveState();
          render();
          setActiveTab("comentarios");
        };
      });

      document.querySelectorAll("[data-pending-action]").forEach(btn => {
        btn.onclick = async () => {
          const termId = btn.dataset.termId;
          const action = btn.dataset.pendingAction;

         if (action === "view") {
          state.selectedId = termId;
          reviewMode = false;
          render();
          setActiveTab("cadastro");
          return;
        }

          if (action === "approve") {
            await approvePending(termId);
            return;
          }

          if (action === "reject") {
            await rejectPending(termId);
          }
        };
      });
    }

    function removeTermCompletely(termId) {
      state.terms = state.terms.filter(t => t.id !== termId);
      state.comments = state.comments.filter(c => c.termId !== termId);
      state.terms.forEach(t => {
        t.relacionados = (t.relacionados || []).filter(id => id !== termId);
      });

      if (state.selectedId === termId) {
        state.selectedId = state.terms[0]?.id || null;
      }
    }

    async function approvePending(termId) {
      const term = getTerm(termId);
      if (!term) return;

      if (term.revisao === REVIEW_EXCLUIR) {
        if (childrenOf(term.id).length) {
          alert("Não é possível aprovar a exclusão de termo com termos específicos. Mova ou delibere os filhos primeiro.");
          return;
        }

        if (!confirm(`Aprovar a exclusão definitiva do termo "${displayTermName(term)}"?`)) return;
        removeTermCompletely(term.id);
      } else {
        clearReview(term);
        term.termoAnterior = "";
      }

      await saveState();
      render();
      setActiveTab("pendencias");
    }

    async function rejectPending(termId) {
      const term = getTerm(termId);
      if (!term) return;

      if (term.revisao === REVIEW_NOVO) {
        if (childrenOf(term.id).length) {
          alert("Não é possível rejeitar termo novo com termos específicos. Delibere ou mova os filhos primeiro.");
          return;
        }

        if (!confirm(`Rejeitar e remover o termo novo "${displayTermName(term)}"?`)) return;
        removeTermCompletely(term.id);
      } else if (term.revisao === REVIEW_MODIFICADO) {
        if (term.original) {
          restoreTermFromOriginal(term);
        }
        clearReview(term);
      } else if (term.revisao === REVIEW_EXCLUIR) {
        clearReview(term);
      }

      await saveState();
      render();
      setActiveTab("pendencias");
    }

    function setActiveTab(tabId) {
      document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === tabId));
      document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === tabId));
    }

    async function addTerm() {
      state = normalizeState(state);
      const value = newTerm.value.trim();

      if (!value) {
        alert("Informe o termo.");
        return;
      }

      const parentId = newParent.value || null;
      const id = uid("term");

      state.terms.push({
        id,
        parentId,
        termo: value,
        termoAnterior: "",
        conceito: "",
        definicao: "",
        notaEscopo: "",
        notaUso: "",
        relacionados: [],
        relacionadosNaoAutorizados: [],
        revisao: REVIEW_NOVO,
        original: null,
        revisaoPor: currentUser.value.trim() || "Usuário",
        revisaoEm: nowLabel()
      });

      if (parentId && !state.expanded.includes(parentId)) state.expanded.push(parentId);
      state.selectedId = id;
      newTerm.value = "";

      await saveState();
      render();
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `tesauro-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importJson(file) {
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!Array.isArray(imported.terms) || !Array.isArray(imported.comments)) {
            throw new Error("Arquivo inválido");
          }
          state = normalizeState(imported);
          await saveState();
          render();
        } catch (e) {
          alert("Não foi possível importar o JSON.");
        }
      };
      reader.readAsText(file);
    }

    function normalizeIcmgKey(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim()
        .toUpperCase();
    }

    function normalizeIcmgName(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    function slugIcmg(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .toLowerCase();
    }

    function firstField(record, key) {
      const values = record.fields[key] || [];
      return String(values[0] || "").trim();
    }

    function allFields(record, key) {
      return (record.fields[key] || [])
        .map(v => String(v || "").trim())
        .filter(Boolean);
    }

    function parseIcmgTxt(text) {
      const lines = String(text || "")
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .split("\n");

      const records = [];
      let current = null;
      let currentKey = null;

      function startRecord(kind, value) {
        if (current) records.push(current);

        current = {
          kind,
          fields: {}
        };

        currentKey = kind;
        current.fields[currentKey] = [String(value || "").trim()];
      }

      function addField(key, value) {
        if (!current) return;

        currentKey = key;

        if (!current.fields[currentKey]) {
          current.fields[currentKey] = [];
        }

        current.fields[currentKey].push(String(value || "").trim());
      }

      function appendToCurrentField(value) {
        if (!current || !currentKey) return;

        const values = current.fields[currentKey];
        if (!values || !values.length) return;

        const lastIndex = values.length - 1;
        const line = String(value || "").trimEnd();

        if (!line.trim()) {
          values[lastIndex] += "\n";
        } else if (values[lastIndex]) {
          values[lastIndex] += "\n" + line;
        } else {
          values[lastIndex] = line;
        }
      }

      for (const rawLine of lines) {
        const line = rawLine.trimEnd();

        const match = line.match(/^\.\.([^:]+?)\.?:\s*(.*)$/);

        if (match) {
          const key = normalizeIcmgKey(match[1]);
          const value = match[2] || "";

          if (key === "TERMO" || key === "NAO AUTORIZADO") {
            startRecord(key, value);
          } else {
            addField(key, value);
          }
        } else {
          appendToCurrentField(line);
        }
      }

      if (current) records.push(current);

      return records;
    }

    function termoFromIcmgRecord(record) {
      const termo = firstField(record, "TERMO");
      const tq = firstField(record, "TQ");
      const controle = firstField(record, "CONTROLE");
      const classe = firstField(record, "CLASSE") || "Sem classe";
      const tg = firstField(record, "TG");

      const definicao = firstField(record, "DF");

      // NE = Nota Explicativa
      const notaExplicativa = allFields(record, "NE").join("\n\n");

      // NH = Nota Histórica
      const notaHistorica = allFields(record, "NH").join("\n\n");

      // UP = Usado por / sinônimos não autorizados
      const usadosPor = allFields(record, "UP");

      const id = controle ? `icmg-${controle}` : `icmg-${slugIcmg(termo)}`;

      return {
        id,
        parentId: null,
        termo,
        termoAnterior: "",
        conceito: tq || "",
        definicao,

        // Mantemos o nome interno notaEscopo para mexer menos no app,
        // mas o rótulo na tela será "Nota Explicativa".
        notaEscopo: notaExplicativa,

        // Mantemos o nome interno notaUso para mexer menos no app,
        // mas o rótulo na tela será "Nota Histórica".
        notaUso: notaHistorica,

        // TR será resolvido depois como relacionamento autorizado.
        relacionados: [],

        // UP fica aqui, separado dos TR.
        relacionadosNaoAutorizados: usadosPor,

        revisao: REVIEW_ORIGINAL,
        original: null,
        revisaoPor: "",
        revisaoEm: "",
        _classe: classe,
        _tg: tg,
        _tr: allFields(record, "TR")
      };
    }

    function montarTermosDaEstruturaIcmg(text) {
      const records = parseIcmgTxt(text);

      const authorizedRecords = records.filter(record => {
        return record.kind === "TERMO" && firstField(record, "TERMO");
      });

      const terms = authorizedRecords.map(termoFromIcmgRecord);

      const byName = new Map();
      const byTq = new Map();

      for (const term of terms) {
        byName.set(normalizeIcmgName(term.termo), term.id);

        if (term.conceito) {
          byTq.set(normalizeIcmgName(term.conceito), term.id);
        }
      }

      const classes = Array.from(new Set(
        terms.map(term => term._classe || "Sem classe").filter(Boolean)
      )).sort((a, b) => a.localeCompare(b, "pt-BR"));

      const classTerms = classes.map(classe => ({
        id: `classe-${slugIcmg(classe)}`,
        parentId: null,
        termo: classe,
        termoAnterior: "",
        conceito: "",
        definicao: "Classe geral importada do documento ICMG.",
        notaEscopo: "",
        notaUso: "",
        relacionados: [],
        revisao: REVIEW_ORIGINAL,
        original: null,
        revisaoPor: "",
        revisaoEm: ""
      }));

      const classIdByName = new Map(
        classTerms.map(term => [normalizeIcmgName(term.termo), term.id])
      );

      for (const term of terms) {
        const tg = term._tg || "";
        const classe = term._classe || "Sem classe";

        const tgNorm = normalizeIcmgName(tg);
        const classeNorm = normalizeIcmgName(classe);

        const classId = classIdByName.get(classeNorm) || null;

        if (!tg) {
          term.parentId = classId;
        } else if (tgNorm === classeNorm) {
          term.parentId = classId;
        } else if (byName.has(tgNorm)) {
          term.parentId = byName.get(tgNorm);
        } else if (byTq.has(tgNorm)) {
          term.parentId = byTq.get(tgNorm);
        } else {
          term.parentId = classId;
        }

        const relatedIds = [];

        for (const relatedName of term._tr || []) {
          const relatedNorm = normalizeIcmgName(relatedName);
          const relatedId = byName.get(relatedNorm) || byTq.get(relatedNorm);

          if (relatedId && relatedId !== term.id && !relatedIds.includes(relatedId)) {
            relatedIds.push(relatedId);
          }
        }

        term.relacionados = relatedIds;

        delete term._classe;
        delete term._tg;
        delete term._tr;
      }

      return classTerms.concat(terms);
    }

    function importarIcmgTxt(file) {
      const reader = new FileReader();

      reader.onload = async () => {
        try {
          if (!confirm("Importar a estrutura do documento ICMG? Isso substituirá os dados atuais do protótipo.")) {
            return;
          }

          setStatus("Importando estrutura do documento ICMG...");

          const termos = montarTermosDaEstruturaIcmg(reader.result);

          if (!termos.length) {
            throw new Error("Nenhum termo autorizado ativo foi identificado no arquivo.");
          }

          const rootIds = termos
            .filter(term => term.parentId === null)
            .map(term => term.id);

          state = normalizeState({
            selectedId: termos[0]?.id || null,
            expanded: rootIds,
            terms: termos,
            comments: []
          });

          reviewMode = false;

          await saveState();
          render();

          setStatus(`Importação concluída. Termos carregados: ${termos.length}.`);
          alert(`Importação concluída. Termos carregados: ${termos.length}.`);
        } catch (error) {
          console.error(error);
          setStatus("Erro na importação do ICMG.");
          alert(`Erro ao importar o documento ICMG.\n\nDetalhe: ${error.message}`);
        }
      };

      reader.readAsText(file, "windows-1252");
    }

    function simpleHash(text) {
      let hash = 0;
      const value = String(text || "");

      for (let i = 0; i < value.length; i++) {
        hash = ((hash << 5) - hash) + value.charCodeAt(i);
        hash |= 0;
      }

      return `${value.length}-${hash}`;
    }

    async function obterVersaoIcmgGithub() {
      const response = await fetch(`${ICMG_TXT_URL}?check=${Date.now()}`, {
        method: "HEAD",
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(`Não foi possível verificar ${ICMG_TXT_URL}. HTTP ${response.status}`);
      }

      const etag = response.headers.get("etag") || "";
      const lastModified = response.headers.get("last-modified") || "";
      const contentLength = response.headers.get("content-length") || "";

      return [etag, lastModified, contentLength].filter(Boolean).join("|");
    }

    async function baixarIcmgTxtGithub() {
      const response = await fetch(`${ICMG_TXT_URL}?import=${Date.now()}`, {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(`Não foi possível baixar ${ICMG_TXT_URL}. HTTP ${response.status}`);
      }

      const buffer = await response.arrayBuffer();

      // O TXT do ICMG parece estar em Windows-1252, por isso não usamos UTF-8 aqui.
      return new TextDecoder("windows-1252").decode(buffer);
    }

    async function importarIcmgGithubSeNecessario() {
      try {
        if (
          state.icmgSourceVersion === ICMG_IMPORT_VERSION &&
          Array.isArray(state.terms) &&
          state.terms.length
        ) {
          return false;
        }

        setStatus("Importando ICMG.txt do GitHub...");

        const text = await baixarIcmgTxtGithub();
        const termos = montarTermosDaEstruturaIcmg(text);

        if (!termos.length) {
          throw new Error("Nenhum termo autorizado foi identificado no ICMG.txt.");
        }

        const idsValidos = new Set(termos.map(term => term.id));

        const rootIds = termos
          .filter(term => term.parentId === null)
          .map(term => term.id);

        const selectedIdAtualExiste = state.selectedId && idsValidos.has(state.selectedId);

        const comments = Array.isArray(state.comments)
          ? state.comments.filter(comment => idsValidos.has(comment.termId))
          : [];

        state = normalizeState({
          selectedId: selectedIdAtualExiste ? state.selectedId : (termos[0]?.id || null),
          expanded: rootIds,
          terms: termos,
          comments,
          icmgSourceVersion: ICMG_IMPORT_VERSION,
          icmgSourceImportedAt: nowLabel()
        });

        reviewMode = false;

        await saveState();

        setStatus(`ICMG.txt importado. Termos carregados: ${termos.length}.`);

        return true;
      } catch (error) {
        console.error(error);
        setStatus(`Não foi possível importar o ICMG.txt: ${error.message}`);
        return false;
      }
    }

    // ============================================================
    // Importação do Thesaurus ALMG
    // Busca as páginas e filtra apenas <autorizado>true</autorizado>.
    // ============================================================
    function sameName(localName, names) {
      const normalized = String(localName || "").toLowerCase();
      return names.some(name => String(name || "").toLowerCase() === normalized);
    }

    function getDirectChildElement(element, possibleNames) {
      for (const child of Array.from(element.children || [])) {
        if (sameName(child.localName, possibleNames)) return child;
      }
      return null;
    }

    function getDirectChildText(element, possibleNames) {
      const child = getDirectChildElement(element, possibleNames);
      return child ? String(child.textContent || "").trim() : "";
    }

    function getDescendantText(element, possibleNames) {
      const descendants = Array.from(element.getElementsByTagName("*"));
      for (const child of descendants) {
        if (sameName(child.localName, possibleNames)) {
          return String(child.textContent || "").trim();
        }
      }
      return "";
    }

    function getBestText(element, possibleNames) {
      return getDirectChildText(element, possibleNames) || getDescendantText(element, possibleNames);
    }

    function parseBool(value) {
      return ["true", "1", "sim", "s"].includes(String(value || "").trim().toLowerCase());
    }

    function makeSafeId(value) {
      const raw = String(value || "").trim();
      if (!raw) return uid("almg");

      let safe = "";
      for (const char of raw) {
        const code = char.charCodeAt(0);
        const isNumber = code >= 48 && code <= 57;
        const isUpper = code >= 65 && code <= 90;
        const isLower = code >= 97 && code <= 122;
        const isAllowed = isNumber || isUpper || isLower || char === "_" || char === "-";
        safe += isAllowed ? char : "-";
      }
      return "almg-" + safe;
    }

    function getTermParentIdFromXml(element) {
      const directParentId = getBestText(element, [
        "termoPaiId",
        "idTermoPai",
        "termoGeralId",
        "idTermoGeral",
        "idPai",
        "paiId",
        "idAscendente",
        "ascendenteId"
      ]);

      if (directParentId) return makeSafeId(directParentId);

      const parentElement = getDirectChildElement(element, [
        "termoPai",
        "termoGeral",
        "pai",
        "ascendente",
        "termoAscendente"
      ]);

      if (parentElement) {
        const nestedParentId = getBestText(parentElement, ["id", "codigo", "cod", "controle", "idTermo"]);
        if (nestedParentId) return makeSafeId(nestedParentId);
      }

      return null;
    }

    function getHierarchyPathsFromXml(element) {
      const paths = [];
      const candidates = Array.from(element.getElementsByTagName("*"));

      for (const node of candidates) {
        if (sameName(node.localName, ["hierarquia", "caminho", "path", "ocorrenciaHierarquia", "ocorrenciasHierarquias"])) {
          const text = String(node.textContent || "").trim();
          if (text.includes("/") && text.length < 1000) paths.push(text);
        }
      }

      return Array.from(new Set(paths));
    }

    function xmlToTerms(xmlText) {
      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, "application/xml");
      const parserError = xml.querySelector("parsererror");

      if (parserError) {
        throw new Error("Erro ao interpretar XML retornado pela API.");
      }

      const termElements = Array.from(xml.getElementsByTagName("*")).filter(el => {
        return getDirectChildText(el, ["autorizado"]) !== "";
      });

      const authorized = [];
      const pathDerivedTerms = new Map();

      for (const element of termElements) {
        const autorizado = parseBool(getDirectChildText(element, ["autorizado"]));
        if (!autorizado) continue;

        const rawId = getBestText(element, ["id", "codigo", "cod", "controle", "idTermo", "identificador"]);
        const termo = getBestText(element, ["termo", "descricao", "descritor", "nome", "nomeTermo"]);
        if (!termo) continue;

        const id = makeSafeId(rawId || termo);
        const parentId = getTermParentIdFromXml(element);
        const definicao = getBestText(element, ["definicao", "definição", "notaExplicativa", "nota", "conceito"]);
        const notaEscopo = getBestText(element, ["notaEscopo", "notaDeEscopo", "escopo"]);
        const notaUso = getBestText(element, ["notaUso", "notaDeUso", "uso"]);

        authorized.push({
          id,
          parentId,
          termo,
          termoAnterior: "",
          conceito: "",
          definicao,
          notaEscopo,
          notaUso,
          relacionados: [],
          revisao: REVIEW_ORIGINAL,
          original: null,
          revisaoPor: "",
          revisaoEm: ""
        });

        const paths = getHierarchyPathsFromXml(element);
        for (const path of paths) {
          const parts = path
            .split("/")
            .map(p => p.trim())
            .filter(Boolean)
            .filter(p => !["thesaurus", "tesauro"].includes(p.toLowerCase()));

          if (parts.length > 1) {
            let previousId = null;
            for (const part of parts) {
              const pathId = makeSafeId(`path-${part}`);
              if (!pathDerivedTerms.has(pathId)) {
                pathDerivedTerms.set(pathId, {
                  id: pathId,
                  parentId: previousId,
                  termo: part,
                  termoAnterior: "",
                  conceito: "",
                  definicao: "",
                  notaEscopo: "",
                  notaUso: "",
                  relacionados: [],
                  revisao: REVIEW_ORIGINAL,
                  original: null,
                  revisaoPor: "",
                  revisaoEm: ""
                });
              }
              previousId = pathId;
            }
          }
        }
      }

      return {
        totalTermElements: termElements.length,
        authorizedTerms: authorized,
        pathDerivedTerms: Array.from(pathDerivedTerms.values())
      };
    }

    function mergeTermsById(terms) {
      const map = new Map();

      for (const term of terms) {
        if (!map.has(term.id)) {
          map.set(term.id, term);
          continue;
        }

        const current = map.get(term.id);
        map.set(term.id, {
          ...current,
          ...term,
          conceito: term.conceito || current.conceito || "",
          definicao: term.definicao || current.definicao || "",
          notaEscopo: term.notaEscopo || current.notaEscopo || "",
          notaUso: term.notaUso || current.notaUso || "",
          parentId: term.parentId || current.parentId || null,
          relacionados: Array.from(new Set([...(current.relacionados || []), ...(term.relacionados || [])])),
          revisao: current.revisao || term.revisao || REVIEW_ORIGINAL
        });
      }

      return Array.from(map.values());
    }

    function corrigirPaisInexistentes(terms) {
      const ids = new Set(terms.map(t => t.id));
      return terms.map(t => {
        if (!t.parentId || ids.has(t.parentId)) return t;
        return { ...t, parentId: null };
      });
    }

    async function baixarTodosTermosAlmg() {
      let pagina = 1;
      let allAuthorized = [];
      let allPathTerms = [];

      while (true) {
        const url = `${ALMG_THESAURUS_URL}?p=${pagina}&tp=${ALMG_PAGE_SIZE}`;
        setStatus(`Importando página ${pagina} com ${ALMG_PAGE_SIZE} registros por página...`);

        const response = await fetch(url, {
          headers: { "Accept": "application/xml,text/xml,*/*" }
        });

        if (response.status === 400 || response.status === 404) {
          if (allAuthorized.length > 0 || allPathTerms.length > 0) {
            setStatus(`Fim da importação. Última página válida: ${pagina - 1}.`);
            break;
          }
          throw new Error(`Erro na primeira página: HTTP ${response.status}`);
        }

        if (!response.ok) {
          throw new Error(`Erro na página ${pagina}: HTTP ${response.status}`);
        }

        const xmlText = await response.text();
        const parsed = xmlToTerms(xmlText);

        allAuthorized = allAuthorized.concat(parsed.authorizedTerms);
        allPathTerms = allPathTerms.concat(parsed.pathDerivedTerms);

        setStatus(`Página ${pagina} importada. Termos autorizados até agora: ${allAuthorized.length}.`);

        if (parsed.totalTermElements === 0) break;
        if (parsed.totalTermElements < ALMG_PAGE_SIZE) break;

        pagina += 1;
        await sleep(ALMG_DELAY_MS);
      }

      const merged = mergeTermsById(allPathTerms.concat(allAuthorized));
      const corrigidos = corrigirPaisInexistentes(merged);

      setStatus(`Importação finalizada. Autorizados encontrados: ${allAuthorized.length}. Termos na árvore: ${corrigidos.length}.`);
      return corrigidos;
    }

    async function importarThesaurusAlmg() {
      if (!confirm("Importar termos autorizados do Thesaurus da ALMG? Isso substituirá os dados atuais do protótipo.")) return;

      try {
        importAlmgBtn.disabled = true;
        setStatus("Iniciando importação do Thesaurus ALMG...");

        const termos = await baixarTodosTermosAlmg();

        if (!termos.length) {
          throw new Error("Nenhum termo autorizado foi identificado no XML retornado pela API.");
        }

        state = normalizeState({
          selectedId: termos[0]?.id || null,
          expanded: [],
          terms: termos,
          comments: []
        });

        await saveState();
        render();
        setStatus(`Importação concluída. Termos carregados: ${termos.length}.`);
        alert(`Importação concluída. Termos carregados: ${termos.length}.`);
      } catch (error) {
        console.error(error);
        setStatus("Erro na importação.");
        alert(`Erro ao importar Thesaurus da ALMG.

Detalhe: ${error.message}

Se aparecer erro de CORS no console do navegador, a importação direta pelo GitHub Pages está bloqueada e será necessário usar um script Python ou uma função intermediária.`);
      } finally {
        importAlmgBtn.disabled = false;
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

   function render() {
      state = normalizeState(state);
      buildIndexes();

      renderTree();
      renderParentOptions();
      updateReviewTopButton();

      if (reviewMode) {
        renderPendingArea();
      } else {
        renderTermArea();
      }
    }

    reviewTopBtn.addEventListener("click", () => {
      reviewMode = true;
      render();
    });

    collapseToClassesBtn.addEventListener("click", collapseTreeToClasses);
    searchInput.addEventListener("input", renderTree);
    clearSearchBtn.addEventListener("click", () => {
      searchInput.value = "";
      renderTree();
    });

    addTermBtn.addEventListener("click", addTerm);
    newTerm.addEventListener("keydown", e => {
      if (e.key === "Enter") addTerm();
    });

    exportBtn.addEventListener("click", exportJson);
    importBtn.addEventListener("click", () => importFile.click());
    importIcmgBtn.addEventListener("click", () => importIcmgFile.click());
    importAlmgBtn.addEventListener("click", importarThesaurusAlmg);

    importIcmgFile.addEventListener("change", e => {
      const file = e.target.files[0];
      if (file) importarIcmgTxt(file);
      importIcmgFile.value = "";
    });

    resetBtn.addEventListener("click", async () => {
      if (!confirm("Restaurar os dados de exemplo? Isso substituirá os dados salvos no Supabase.")) return;
      state = structuredClone(exemplo);
      await saveState();
      render();
    });

    async function iniciarApp() {
      setStatus("Carregando tesauro...");

      state = await loadState();
      state = normalizeState(state);

      const atualizadoPeloTxt = await importarIcmgGithubSeNecessario();

      expandOnlyClasses();
      render();

      if (!atualizadoPeloTxt) {
        setStatus("");
      }
    }

    initAuth();
  </script>
